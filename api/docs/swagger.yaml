  github_com_flightdeckhq_flightdeck_api_internal_store.EventsResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.Event'
        type: array
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
