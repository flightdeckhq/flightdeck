{{- $component := "dashboard" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "flightdeck.componentName" (dict "root" . "component" $component) }}
  labels:
    {{- include "flightdeck.labels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "flightdeck.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flightdeck.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
      {{- with .Values.dashboard.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "flightdeck.serviceAccountName" (dict "root" . "component" $component) }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: dashboard
          image: {{ include "flightdeck.image" (dict "root" . "component" .Values.dashboard) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # nginx inside the image needs to write its pid, temp, and cache
          # directories. readOnlyRootFilesystem is therefore unset for this
          # container. The dashboard serves pre-built static assets; no
          # secrets live in its filesystem.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
