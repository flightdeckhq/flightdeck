    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.SearchResultEvent:
    properties:
      event_id:
        type: string
      event_type:
        type: string
      model:
        type: string
      occurred_at:
        type: string
      session_id:
        type: string
      tool_name:
        type: string
    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.SearchResultSession:
    properties:
      context:
        additionalProperties: true
        type: object
      ended_at:
        type: string
      flavor:
        type: string
      host:
        type: string
      model:
        type: string
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_limit:
        type: integer
      tokens_used:
        type: integer
    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.SearchResults:
    properties:
      agents:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.SearchResultAgent'
        type: array
      events:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.SearchResultEvent'
        type: array
      sessions:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.SearchResultSession'
        type: array
    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.Session:
    properties:
      agent_type:
        type: string
      block_at_pct:
        type: integer
      capture_enabled:
        description: |-
          CaptureEnabled is true when at least one event in this session
          has has_content=true (i.e. prompt content was captured to
          event_content). Computed via EXISTS subquery so no schema
          change is required.
        type: boolean
      context:
        additionalProperties: {}
        description: |-
          Runtime context collected by the sensor at init() time and
          stored once in sessions.context (JSONB) on the session_start
          event. Carries hostname, OS, git, orchestration, frameworks,
          etc. -- see sensor/flightdeck_sensor/core/context.py.
        type: object
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      ended_at:
        type: string
      flavor:
        type: string
      framework:
        type: string
      has_pending_directive:
        description: HasPendingDirective is true when an undelivered shutdown directive
          exists.
        type: boolean
      host:
        type: string
      last_seen_at:
        type: string
      model:
        type: string
      policy_token_limit:
        description: |-
          Active policy thresholds (nullable).
          Populated by GetSession via effective policy lookup.
          Null if no policy applies at any scope.
        type: integer
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_limit:
        type: integer
      tokens_used:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.SessionListItem:
    properties:
      capture_enabled:
        type: boolean
      context:
        additionalProperties: true
        type: object
      duration_s:
        type: number
      ended_at:
        type: string
      flavor:
        type: string
      host:
        type: string
      model:
        type: string
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_id:
        description: |-
          D095: attribution for the access_tokens row that opened this
          session. TokenID is nullable because revocation clears the FK
          (ON DELETE SET NULL); TokenName is preserved for auditability
          so the UI can still render "Created via: Staging K8s (revoked)"
          long after the token row is gone.
        type: string
      token_limit:
        type: integer
      token_name:
        type: string
      tokens_used:
        type: integer
    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.SessionsResponse:
    properties:
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      sessions:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.SessionListItem'
        type: array
      total:
        type: integer
    type: object
  internal_handlers.CreateAccessTokenRequest:
    properties:
      name:
        type: string
    type: object
  internal_handlers.CustomDirectivesListResponse:
    properties:
      directives:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.CustomDirective'
        type: array
    type: object
  internal_handlers.DeleteCustomDirectivesResponse:
    properties:
      deleted:
        type: integer
    type: object
  internal_handlers.DirectiveRequest:
    properties:
      action:
        type: string
      directive_name:
        type: string
      fingerprint:
        type: string
      flavor:
        type: string
      grace_period_ms:
        type: integer
      parameters:
        type: object
      reason:
        type: string
      session_id:
        type: string
    type: object
  internal_handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  internal_handlers.FleetResponse:
    properties:
      context_facets:
        additionalProperties:
          items:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.ContextFacetValue'
          type: array
        type: object
      flavors:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.FlavorSummary'
        type: array
      total_session_count:
        type: integer
    type: object
  internal_handlers.PolicyRequest:
    properties:
      block_at_pct:
        type: integer
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  internal_handlers.RegisterDirectivesRequest:
    properties:
      directives:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.CustomDirective'
        type: array
      flavor:
        type: string
    type: object
  internal_handlers.RegisterDirectivesResponse:
    properties:
      registered:
        type: integer
    type: object
  internal_handlers.RenameAccessTokenRequest:
    properties:
      name:
        type: string
    type: object
  internal_handlers.SessionResponse:
    properties:
      attachments:
        items:
          type: string
        type: array
      events:
        items:
          $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.Event'
        type: array
      session:
        $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.Session'
    type: object
  internal_handlers.SyncDirectivesRequest:
    properties:
      directives:
        items:
          properties:
            fingerprint:
              type: string
            name:
              type: string
          type: object
        type: array
      flavor:
        type: string
    type: object
  internal_handlers.SyncDirectivesResponse:
    properties:
      unknown_fingerprints:
        items:
          type: string
        type: array
    type: object
host: localhost:8081
info:
  contact: {}
  description: Fleet visibility, session history, and control plane for AI agent fleets
  title: Flightdeck Query API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/access-tokens:
    get:
      description: Returns every access_tokens row. Hash and salt are never exposed;
        the raw token itself is available only on the POST response at creation time
        (D095).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.AccessTokenRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List access tokens
      tags:
      - access-tokens
    post:
      consumes:
      - application/json
      description: Mints an opaque ftd_ bearer token. The plaintext token is returned
        exactly once in the response; the platform cannot recover it afterwards. See
        DECISIONS.md D095.
      parameters:
      - description: Token name
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.CreateAccessTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.CreatedAccessTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Create an access token
      tags:
      - access-tokens
  /v1/access-tokens/{id}:
    delete:
      description: Deletes the access_tokens row. The seeded Development Token row
        is protected and returns 403. Sessions previously authenticated with the token
        keep their token_name for auditability (sessions.token_id is set to NULL via
        ON DELETE SET NULL). See DECISIONS.md D095.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Revoke an access token
      tags:
      - access-tokens
    patch:
      consumes:
      - application/json
      description: Updates the name field on the access_tokens row. Historical sessions
        keep their original token_name snapshot. The Development Token row is protected
        and returns 403.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      - description: New name
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RenameAccessTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.AccessTokenRow'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Rename an access token
      tags:
      - access-tokens
  /v1/analytics:
    get:
      description: Flexible GROUP BY analytics endpoint. Returns time series data
        grouped by dimension.
      parameters:
      - description: 'Metric: tokens, sessions, latency_avg, latency_p50, latency_p95,
          policy_events, estimated_cost (default: tokens)'
        in: query
        name: metric
        type: string
      - description: 'Dimension: flavor, model, framework, host, agent_type, team,
          provider (default: flavor)'
        in: query
        name: group_by
        type: string
      - description: 'Time range: today, 7d, 30d, 90d, custom (default: 30d)'
        in: query
        name: range
        type: string
      - description: Start time ISO 8601 (required when range=custom)
        in: query
        name: from
        type: string
      - description: End time ISO 8601 (required when range=custom)
        in: query
        name: to
        type: string
      - description: 'Granularity: hour, day, week (default: day)'
        in: query
        name: granularity
        type: string
      - description: Filter to specific flavor
        in: query
        name: filter_flavor
        type: string
      - description: Filter to specific model
        in: query
        name: filter_model
        type: string
      - description: Filter to specific agent_type
        in: query
        name: filter_agent_type
        type: string
      - description: Filter to specific provider (anthropic, openai, google, xai,
          mistral, meta, other)
        in: query
        name: filter_provider
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.AnalyticsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Query analytics
      tags:
      - analytics
  /v1/directives:
    post:
      consumes:
      - application/json
      description: Issues a shutdown or custom directive to a single agent session
        or all sessions of a flavor
      parameters:
      - description: Directive definition
        in: body
        name: directive
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.DirectiveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.Directive'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Create directive
      tags:
      - directives
  /v1/directives/custom:
    delete:
      description: Deletes custom_directives rows where name LIKE prefix%. Intended
        for smoke test idempotency; not a production feature.
      parameters:
      - description: Name prefix to match (e.g. smoke_)
        in: query
        name: name_prefix
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.DeleteCustomDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Delete custom directives by name prefix (dev/test only)
      tags:
      - custom-directives
    get:
      description: Returns all registered custom directives, optionally filtered by
        flavor.
      parameters:
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.CustomDirectivesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List custom directives
      tags:
      - custom-directives
  /v1/directives/register:
    post:
      consumes:
      - application/json
      description: Registers custom directive definitions. Updates last_seen_at on
        conflict. Requires bearer token.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Registration request with directives
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RegisterDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.RegisterDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Register custom directives
      tags:
      - custom-directives
  /v1/directives/sync:
    post:
      consumes:
      - application/json
      description: Checks which directive fingerprints are registered. Returns fingerprints
        not found. Requires bearer token.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Sync request with flavor and fingerprints
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.SyncDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.SyncDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Sync custom directive fingerprints
      tags:
      - custom-directives
  /v1/events:
    get:
      description: Returns events matching time range, flavor, event type, and session
        filters with pagination.
      parameters:
      - description: Start time (ISO 8601)
        in: query
        name: from
        required: true
        type: string
      - description: End time (ISO 8601, defaults to now)
        in: query
        name: to
        type: string
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by session ID
        in: query
        name: session_id
        type: string
      - description: Max results (default 500, max 2000)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
