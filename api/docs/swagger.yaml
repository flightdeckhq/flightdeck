basePath: /
definitions:
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.PolicyRequest:
    properties:
      block_at_pct:
        type: integer
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  store.Policy:
    properties:
      block_at_pct:
        type: integer
      created_at:
        type: string
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      id:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      updated_at:
        type: string
      warn_at_pct:
        type: integer
    type: object
host: localhost:8081
info:
  contact: {}
  description: Fleet visibility, session history, and control plane for AI agent fleets
  title: Flightdeck Query API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/fleet:
    get:
      description: Returns all sessions grouped by flavor, excluding lost sessions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get fleet state
      tags:
      - fleet
  /v1/policies:
    get:
      description: Returns all token policies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Policy'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List policies
      tags:
      - policies
    post:
      consumes:
      - application/json
      description: Creates a new token policy
      parameters:
      - description: Policy definition
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/handlers.PolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Policy'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create policy
      tags:
      - policies
  /v1/policies/{id}:
    delete:
      description: Deletes a token policy
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete policy
      tags:
      - policies
    put:
      consumes:
      - application/json
      description: Updates an existing token policy
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      - description: Policy definition
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/handlers.PolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Policy'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Update policy
      tags:
      - policies
  /v1/policy:
    get:
      description: 'Returns the most specific policy for a given flavor/session scope.
        Lookup order: session > flavor > org'
      parameters:
      - description: Agent flavor
        in: query
        name: flavor
        type: string
      - description: Session ID
        in: query
        name: session_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Policy'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get effective policy
      tags:
      - policies
  /v1/sessions/{id}:
    get:
      description: Returns session metadata and all events in chronological order
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get session detail
      tags:
      - sessions
  /v1/stream:
    get:
      description: WebSocket connection for real-time fleet state updates. Upgrades
        HTTP to WebSocket.
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Real-time fleet stream
      tags:
      - stream
swagger: "2.0"
