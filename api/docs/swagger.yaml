        type: integer
      created_at:
        type: string
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      id:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      updated_at:
        type: string
      warn_at_pct:
        type: integer
    type: object
  github_com_flightdeckhq_flightdeck_api_internal_store.SearchResultAgent:
    properties:
      agent_type:
        type: string
      flavor:
        type: string
