  /v1/search:
    get:
      description: Searches agents, sessions, and events by partial match. Returns
        up to 5 results per group.
      parameters:
      - description: Search query (min 1, max 200 characters)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.SearchResults'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Cross-entity search
      tags:
      - search
  /v1/sessions:
    get:
      description: Returns sessions matching time range, state, flavor, client_type,
        agent_type, model, framework, agent_id, context-scalar (user/os/hostname/git_branch/orchestration/...),
        and search filters with pagination and sort support. Multi-value filters (state,
        flavor, client_type, framework, agent_type, context-scalar) accept repeated
        query params and comma-separated values; values within a dimension are OR,
        values across dimensions are AND. ``q`` is a case-insensitive substring search
        across agent_name, flavor, host, model, session_id, context.hostname, context.os,
        context.git_branch, context.python_version, and the frameworks array.
      parameters:
      - description: Full-text search across agent_name, flavor, host, model, session_id,
          context.hostname, context.os, context.git_branch, context.python_version,
          frameworks
        in: query
        name: q
        type: string
      - description: 'Start time (ISO 8601, default: 7 days ago)'
        in: query
        name: from
        type: string
      - description: 'End time (ISO 8601, default: now)'
        in: query
        name: to
        type: string
      - description: 'Filter by state (repeatable: active, idle, stale, closed, lost)'
        in: query
        name: state
        type: string
      - description: Filter by flavor (repeatable)
        in: query
        name: flavor
        type: string
      - description: Filter to a single agent (D115 UUID; deep-linked from the Fleet
          agent table and Investigate AGENT facet)
        in: query
        name: agent_id
        type: string
      - description: 'Filter by agent_type (repeatable: coding, production)'
        in: query
        name: agent_type
        type: string
      - description: 'Filter by client_type (repeatable: claude_code, flightdeck_sensor)'
        in: query
        name: client_type
        type: string
      - description: 'Filter by framework name/version matching sessions.context.frameworks[]
          (repeatable: langgraph/1.1.6, crewai/1.14.1, ...)'
        in: query
        name: framework
        type: string
      - description: Filter by model
        in: query
        name: model
        type: string
      - description: Filter by context.user (repeatable)
        in: query
        name: user
        type: string
      - description: Filter by context.os (repeatable)
        in: query
        name: os
        type: string
      - description: Filter by context.hostname (repeatable)
        in: query
        name: hostname
        type: string
      - description: Filter by context.arch (repeatable)
        in: query
        name: arch
        type: string
      - description: Filter by context.git_branch (repeatable)
        in: query
        name: git_branch
        type: string
      - description: Filter by context.git_repo (repeatable)
        in: query
        name: git_repo
        type: string
      - description: Filter by context.orchestration (repeatable)
        in: query
        name: orchestration
        type: string
      - description: 'Filter to sessions that emitted an llm_error event of one of
          the listed taxonomy values (repeatable/comma). 14-entry vocabulary: rate_limit,
          quota_exceeded, context_overflow, content_filter, invalid_request, authentication,
          permission, not_found, request_too_large, api_error, overloaded, timeout,
          stream_error, other.'
        in: query
        name: error_type
        type: string
      - description: 'Filter to sessions that emitted at least one policy enforcement
          event of the listed types (repeatable/comma). Vocabulary: policy_warn, policy_degrade,
          policy_block, policy_mcp_warn, policy_mcp_block, mcp_server_name_changed,
          mcp_policy_user_remembered.'
        in: query
        name: policy_event_type
        type: string
      - description: 'Filter to sessions that connected to an MCP server with the
          given name (repeatable/comma). Phase 5: backed by the JSONB array sessions.context.mcp_servers.
          Each row in the response carries mcp_server_names[] for facet rendering.'
        in: query
        name: mcp_server
        type: string
      - description: 'D126: filter to children of one specific parent session (UUID).
          Used by the SessionDrawer Sub-agents tab to fetch the per-parent child list.'
        in: query
        name: parent_session_id
        type: string
      - description: 'D126: filter by sub-agent role string (repeatable/comma). CrewAI
          Agent.role, LangGraph node name, Claude Code Task agent_type. Backs the
          Investigate ROLE facet.'
        in: query
        name: agent_role
        type: string
      - description: 'D126: when true, restrict to parent sessions only (those referenced
          as a parent_session_id by at least one other session). Backs the Investigate
          TOPOLOGY facet ''Has sub-agents'' checkbox.'
        in: query
        name: has_sub_agents
        type: boolean
      - description: 'D126: when true, restrict to child sessions only (parent_session_id
          IS NOT NULL). Backs the Investigate TOPOLOGY facet ''Is sub-agent'' checkbox.'
        in: query
        name: is_sub_agent
        type: boolean
      - description: 'D126 UX revision 2026-05-03: when false, exclude pure children
          (rows whose parent_session_id is set AND that themselves have no descendants),
          leaving parents-with-children + lone sessions. Default scope of the Investigate
          page. Omit or set true to preserve the legacy ''all sessions'' behaviour.'
        in: query
        name: include_pure_children
        type: boolean
      - description: 'Filter to sessions whose session_end carries one of the listed
          close_reason values (repeatable/comma; OR within, AND across dimensions).
          Allowed: normal_exit, directive_shutdown, policy_block, orphan_timeout,
          sigkill_detected, unknown.'
        in: query
        name: close_reason
        type: string
      - description: 'Filter to sessions that emitted at least one pre_call/post_call/embeddings
          event with the given estimated_via (repeatable/comma; OR within, AND across
          dimensions). Allowed: tiktoken, heuristic, none.'
        in: query
        name: estimated_via
        type: string
      - description: When true, restrict to sessions that have at least one llm_error
          event with terminal=true (operator-actionable retry-chain-gave-up signal).
          Composes with every other filter via AND.
        in: query
        name: terminal
        type: boolean
      - description: Filter to sessions that emitted at least one policy_mcp_warn
          / policy_mcp_block event whose policy_decision.matched_entry_id matches
          one of the listed UUIDs (repeatable/comma; OR within, AND across dimensions).
        in: query
        name: matched_entry_id
        type: string
      - description: 'Filter to sessions that emitted at least one event with originating_call_context
          matching one of the listed values (repeatable/comma; OR within, AND across
          dimensions). Vocabulary: call_tool, read_resource, list_tools, get_prompt,
          list_resources, list_prompts.'
        in: query
        name: originating_call_context
        type: string
      - description: 'Sort field: started_at, last_seen_at, duration, tokens_used,
          flavor, model, hostname, state (default: started_at). state sort uses severity
          ordinal active→idle→stale→lost→closed.'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc, desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Max results (default 25, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.SessionsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List sessions with filters, search, and pagination
      tags:
      - sessions
  /v1/sessions/{id}:
    get:
      description: Returns session metadata (including effective policy thresholds)
        and events in chronological order. When ``events_limit`` is provided, the
        N newest events are returned (still sorted ASC); the drawer uses this to cap
        the initial fetch on long-running stable sessions.
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      - description: Return at most N newest events (1-1000). Omit for the full history.
        in: query
        name: events_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get session detail
      tags:
      - sessions
  /v1/stream:
    get:
      description: WebSocket connection for real-time fleet state updates. Upgrades
        HTTP to WebSocket. Accepts bearer token via the Authorization header OR ``?token=``
        query parameter (browsers cannot set headers on the WS upgrade).
      parameters:
      - description: Bearer token, alternative to Authorization header
        in: query
        name: token
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Real-time fleet stream
