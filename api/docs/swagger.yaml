  /v1/fleet:
    get:
      description: Returns sessions grouped by flavor, excluding lost sessions. Includes
        runtime context facets aggregated across all non-terminal sessions for the
        dashboard CONTEXT sidebar.
      parameters:
      - description: Max sessions to return (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Offset into sessions list (default 0)
        in: query
        name: offset
        type: integer
      - description: 'Filter by agent type: ''developer'', ''production'', or empty
          for all'
        in: query
        name: agent_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.FleetResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
