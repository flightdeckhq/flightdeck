upstream dashboard {
    server dashboard:3000;
}

upstream api {
    server api:8081;
}

upstream ingestion {
    server ingestion:8080;
}

server {
    listen 4000;
    server_name _;

    # Retry upstream on connection errors (safety net during startup)
    proxy_connect_timeout 2s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 10;
    proxy_next_upstream_timeout 30s;

    # /investigate -> /events permanent redirect. Preserves any
    # operator bookmarks, blog posts, and saved links that point
    # at the legacy route. 301 is the durable answer here (browsers
    # cache the rewrite so subsequent navigations skip the round-
    # trip). ``$is_args$args`` carries any query string through so
    # deep links like /investigate?agent_id=<uuid> resolve correctly.
    # Mirrors the same redirect in nginx.prod.conf so dev and prod
    # stay byte-identical on this contract.
    location = /investigate {
        return 301 /events$is_args$args;
    }

    # Dashboard
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Query API (strip /api prefix)
    location /api/ {
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support for /api/v1/stream
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Ingestion API (strip /ingest prefix)
    location /ingest/ {
        proxy_pass http://ingestion/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
