{{- /*
Shared Secret carrying the Postgres DSN (external or bundled), the Postgres
superuser password used by the bundled StatefulSet, and the api-only auth
bootstrap values.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flightdeck.secretName" . }}
  labels:
    {{- include "flightdeck.labels" (dict "root" . "component" "shared") | nindent 4 }}
type: Opaque
stringData:
  FLIGHTDECK_POSTGRES_URL: {{ include "flightdeck.postgresURL" . | quote }}
  {{- if not .Values.postgres.externalUrl }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | default "flightdeck" | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  {{- end }}
  FLIGHTDECK_JWT_SECRET: {{ .Values.api.auth.jwtSecret | quote }}
  FLIGHTDECK_ADMIN_EMAIL: {{ .Values.api.auth.adminEmail | quote }}
  FLIGHTDECK_ADMIN_PASSWORD: {{ .Values.api.auth.adminPassword | quote }}
