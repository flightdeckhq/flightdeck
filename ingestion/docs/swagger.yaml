basePath: /
definitions:
  handlers.DirectiveResponse:
    properties:
      action:
        type: string
      degrade_to:
        type: string
      grace_period_ms:
        type: integer
      id:
        type: string
      reason:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.EventResponse:
    properties:
      directive:
        $ref: '#/definitions/handlers.DirectiveResponse'
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Receives sensor events and delivers directives to agents
  title: Flightdeck Ingestion API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/events:
    post:
      consumes:
      - application/json
      description: Validates bearer token, publishes event to NATS, returns directive
        envelope
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Event payload
        in: body
        name: event
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EventResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Submit agent event
      tags:
      - events
  /v1/heartbeat:
    post:
      consumes:
      - application/json
      description: Validates bearer token, publishes heartbeat to NATS, returns directive
        envelope
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Heartbeat payload with session_id
        in: body
        name: heartbeat
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Agent heartbeat
      tags:
      - heartbeat
swagger: "2.0"
