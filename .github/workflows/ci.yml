name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sensor:
    name: Sensor (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,anthropic,openai]"

      - name: mypy --strict
        run: mypy flightdeck_sensor/ --strict

      - name: ruff check
        run: ruff check flightdeck_sensor/

      - name: Test with coverage
        run: |
          pytest tests/ -v \
            --cov=flightdeck_sensor \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload sensor coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-sensor
          path: sensor/htmlcov/
          retention-days: 14

  go:
    name: Go (ingestion, workers, api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint ingestion
        working-directory: ingestion
        run: golangci-lint run ./... --timeout=5m

      - name: Lint workers
        working-directory: workers
        run: golangci-lint run ./... --timeout=5m

      - name: Lint api
        working-directory: api
        run: golangci-lint run ./... --timeout=5m

      - name: Test ingestion
        working-directory: ingestion
        run: |
          go test ./tests/... -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/handlers/...

      - name: Check ingestion coverage threshold
        run: |
          cd ingestion
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | sed 's/%//')
          echo "Ingestion coverage (handlers): ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 67" | bc -l) )); then
            echo "FAIL: ${COVERAGE}% below 67%"
            exit 1
          fi
          echo "PASS: ${COVERAGE}% meets 67%"

      - name: Print ingestion coverage summary
        run: |
          cd ingestion
          go tool cover -func=coverage.out | tail -20

      - name: Generate ingestion HTML report
        if: always()
        run: |
          cd ingestion
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload ingestion coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ingestion
          path: ingestion/coverage.html
          retention-days: 14

      - name: Test workers
        working-directory: workers
        run: |
          go test ./tests/... -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/...

      - name: Report workers coverage (no threshold)
        run: |
          cd workers
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}')
          echo "Workers coverage: ${COVERAGE}"
          echo "No threshold -- SQL paths covered by integration tests."
          go tool cover -func=coverage.out | tail -20

      - name: Generate workers HTML report
        if: always()
        run: |
          cd workers
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload workers coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-workers
          path: workers/coverage.html
          retention-days: 14

      - name: Test api
        working-directory: api
        run: |
          go test ./tests/... -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/handlers/...

      - name: Check api coverage threshold
        run: |
          cd api
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | sed 's/%//')
          echo "API coverage (handlers): ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 66" | bc -l) )); then
            echo "FAIL: ${COVERAGE}% below 66%"
            exit 1
          fi
          echo "PASS: ${COVERAGE}% meets 66%"

      - name: Print api coverage summary
        run: |
          cd api
          go tool cover -func=coverage.out | tail -20

      - name: Generate api HTML report
        if: always()
        run: |
          cd api
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload api coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: api/coverage.html
          retention-days: 14

  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  integration:
    name: Integration + sensor e2e
    runs-on: ubuntu-latest
    needs: [sensor, go, dashboard]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sensor with dev + provider extras
        working-directory: sensor
        run: pip install -e ".[dev,anthropic,openai]"

      - name: Boot the dev stack
        # `make dev` returns once all services have been instructed to
        # start. tests/integration/conftest.py:_wait_for_services then
        # polls the /health endpoints with a 60 s ceiling, so the
        # integration test process is responsible for waiting on the
        # stack -- the workflow does not need a separate readiness
        # probe here.
        run: make dev

      - name: Run integration tests (fabricated + sensor e2e)
        run: make test-integration

      - name: Run sensor e2e tests in isolation
        # Same suite as test-integration but limited to the e2e file
        # so a regression in the e2e harness shows up as its own
        # failed step rather than being lost in the larger suite log.
        run: make test-e2e

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml logs --tail=300 || true
          docker compose -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml ps || true

      - name: Tear down stack
        if: always()
        run: make down || true
