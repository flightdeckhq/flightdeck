upstream dashboard {
    server dashboard:3000;
}

upstream api {
    server api:8081;
}

upstream ingestion {
    server ingestion:8080;
}

server {
    listen 4000;
    server_name _;

    # Retry upstream on connection errors (safety net during startup)
    proxy_connect_timeout 2s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 10;
    proxy_next_upstream_timeout 30s;

    # Dashboard
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Query API (strip /api prefix)
    location /api/ {
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support for /api/v1/stream
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Ingestion API (strip /ingest prefix)
    location /ingest/ {
        proxy_pass http://ingestion/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
