basePath: /
definitions:
  handlers.CustomDirectivesListResponse:
    properties:
      directives:
        items:
          $ref: '#/definitions/store.CustomDirective'
        type: array
    type: object
  handlers.DirectiveRequest:
    properties:
      action:
        type: string
      directive_name:
        type: string
      fingerprint:
        type: string
      flavor:
        type: string
      grace_period_ms:
        type: integer
      parameters:
        type: object
      reason:
        type: string
      session_id:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.FleetResponse:
    properties:
      context_facets:
        additionalProperties:
          items:
            $ref: '#/definitions/store.ContextFacetValue'
          type: array
        type: object
      flavors:
        items:
          $ref: '#/definitions/store.FlavorSummary'
        type: array
      total_session_count:
        type: integer
    type: object
  handlers.PolicyRequest:
    properties:
      block_at_pct:
        type: integer
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  handlers.RegisterDirectivesRequest:
    properties:
      directives:
        items:
          $ref: '#/definitions/store.CustomDirective'
        type: array
      flavor:
        type: string
    type: object
  handlers.RegisterDirectivesResponse:
    properties:
      registered:
        type: integer
    type: object
  handlers.SessionResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/store.Event'
        type: array
      session:
        $ref: '#/definitions/store.Session'
    type: object
  handlers.SyncDirectivesRequest:
    properties:
      directives:
        items:
          properties:
            fingerprint:
              type: string
            name:
              type: string
          type: object
        type: array
      flavor:
        type: string
    type: object
  handlers.SyncDirectivesResponse:
    properties:
      unknown_fingerprints:
        items:
          type: string
        type: array
    type: object
  store.AnalyticsResponse:
    properties:
      granularity:
        type: string
      group_by:
        type: string
      metric:
        type: string
      range:
        type: string
      series:
        items:
          $ref: '#/definitions/store.AnalyticsSeries'
        type: array
      totals:
        $ref: '#/definitions/store.AnalyticsTotals'
    type: object
  store.AnalyticsSeries:
    properties:
      data:
        items:
          $ref: '#/definitions/store.DataPoint'
        type: array
      dimension:
        type: string
      total:
        type: number
    type: object
  store.AnalyticsTotals:
    properties:
      grand_total:
        type: number
      period_change_pct:
        type: number
    type: object
  store.ContextFacetValue:
    properties:
      count:
        type: integer
      value:
        type: string
    type: object
  store.CustomDirective:
    properties:
      description:
        type: string
      fingerprint:
        type: string
      flavor:
        type: string
      id:
        type: string
      last_seen_at:
        type: string
      name:
        type: string
      parameters: {}
      registered_at:
        type: string
    type: object
  store.DataPoint:
    properties:
      date:
        type: string
      value:
        type: number
    type: object
  store.Directive:
    properties:
      action:
        type: string
      degrade_to:
        type: string
      delivered_at:
        type: string
      flavor:
        type: string
      grace_period_ms:
        type: integer
      id:
        type: string
      issued_at:
        type: string
      issued_by:
        type: string
      payload:
        type: object
      reason:
        type: string
      session_id:
        type: string
    type: object
  store.Event:
    properties:
      event_type:
        type: string
      flavor:
        type: string
      has_content:
        type: boolean
      id:
        type: string
      latency_ms:
        type: integer
      model:
        type: string
      occurred_at:
        type: string
      payload:
        additionalProperties: {}
        type: object
      session_id:
        type: string
      tokens_input:
        type: integer
      tokens_output:
        type: integer
      tokens_total:
        type: integer
      tool_name:
        type: string
    type: object
  store.EventContent:
    properties:
      captured_at:
        type: string
      event_id:
        type: string
      messages: {}
      model:
        type: string
      provider:
        type: string
      response: {}
      session_id:
        type: string
      system_prompt:
        type: string
      tools: {}
    type: object
  store.EventsResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/store.Event'
        type: array
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  store.FlavorSummary:
    properties:
      active_count:
        type: integer
      agent_type:
        type: string
      flavor:
        type: string
      session_count:
        type: integer
      sessions:
        items:
          $ref: '#/definitions/store.Session'
        type: array
      tokens_used_total:
        type: integer
    type: object
  store.Policy:
    properties:
      block_at_pct:
        type: integer
      created_at:
        type: string
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      id:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      updated_at:
        type: string
      warn_at_pct:
        type: integer
    type: object
  store.SearchResultAgent:
    properties:
      agent_type:
        type: string
      flavor:
        type: string
      last_seen:
        type: string
    type: object
  store.SearchResultEvent:
    properties:
      event_id:
        type: string
      event_type:
        type: string
      model:
        type: string
      occurred_at:
        type: string
      session_id:
        type: string
      tool_name:
        type: string
    type: object
  store.SearchResultSession:
    properties:
      flavor:
        type: string
      host:
        type: string
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
    type: object
  store.SearchResults:
    properties:
      agents:
        items:
          $ref: '#/definitions/store.SearchResultAgent'
        type: array
      events:
        items:
          $ref: '#/definitions/store.SearchResultEvent'
        type: array
      sessions:
        items:
          $ref: '#/definitions/store.SearchResultSession'
        type: array
    type: object
  store.Session:
    properties:
      agent_type:
        type: string
      block_at_pct:
        type: integer
      context:
        additionalProperties: {}
        description: |-
          Runtime context collected by the sensor at init() time and
          stored once in sessions.context (JSONB) on the session_start
          event. Carries hostname, OS, git, orchestration, frameworks,
          etc. -- see sensor/flightdeck_sensor/core/context.py.
        type: object
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      ended_at:
        type: string
      flavor:
        type: string
      framework:
        type: string
      has_pending_directive:
        description: HasPendingDirective is true when an undelivered shutdown directive
          exists.
        type: boolean
      host:
        type: string
      last_seen_at:
        type: string
      model:
        type: string
      policy_token_limit:
        description: |-
          Active policy thresholds (nullable).
          Populated by GetSession via effective policy lookup.
          Null if no policy applies at any scope.
        type: integer
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_limit:
        type: integer
      tokens_used:
        type: integer
      warn_at_pct:
        type: integer
    type: object
host: localhost:8081
info:
  contact: {}
  description: Fleet visibility, session history, and control plane for AI agent fleets
  title: Flightdeck Query API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/analytics:
    get:
      description: Flexible GROUP BY analytics endpoint. Returns time series data
        grouped by dimension.
      parameters:
      - description: 'Metric: tokens, sessions, latency_avg, policy_events (default:
          tokens)'
        in: query
        name: metric
        type: string
      - description: 'Dimension: flavor, model, framework, host, agent_type, team
          (default: flavor)'
        in: query
        name: group_by
        type: string
      - description: 'Time range: 7d, 30d, 90d, custom (default: 30d)'
        in: query
        name: range
        type: string
      - description: Start time ISO 8601 (required when range=custom)
        in: query
        name: from
        type: string
      - description: End time ISO 8601 (required when range=custom)
        in: query
        name: to
        type: string
      - description: 'Granularity: hour, day, week (default: day)'
        in: query
        name: granularity
        type: string
      - description: Filter to specific flavor
        in: query
        name: filter_flavor
        type: string
      - description: Filter to specific model
        in: query
        name: filter_model
        type: string
      - description: Filter to specific agent_type
        in: query
        name: filter_agent_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AnalyticsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Query analytics
      tags:
      - analytics
  /v1/directives:
    post:
      consumes:
      - application/json
      description: Issues a shutdown or custom directive to a single agent session
        or all sessions of a flavor
      parameters:
      - description: Directive definition
        in: body
        name: directive
        required: true
        schema:
          $ref: '#/definitions/handlers.DirectiveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Directive'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create directive
      tags:
      - directives
  /v1/directives/custom:
    get:
      description: Returns all registered custom directives, optionally filtered by
        flavor.
      parameters:
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CustomDirectivesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List custom directives
      tags:
      - custom-directives
  /v1/directives/register:
    post:
      consumes:
      - application/json
      description: Registers custom directive definitions. Updates last_seen_at on
        conflict.
      parameters:
      - description: Registration request with directives
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RegisterDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Register custom directives
      tags:
      - custom-directives
  /v1/directives/sync:
    post:
      consumes:
      - application/json
      description: Checks which directive fingerprints are registered. Returns fingerprints
        not found.
      parameters:
      - description: Sync request with flavor and fingerprints
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SyncDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SyncDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Sync custom directive fingerprints
      tags:
      - custom-directives
  /v1/events:
    get:
      description: Returns events matching time range, flavor, event type, and session
        filters with pagination.
      parameters:
      - description: Start time (ISO 8601)
        in: query
        name: from
        required: true
        type: string
      - description: End time (ISO 8601, defaults to now)
        in: query
        name: to
        type: string
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by session ID
        in: query
        name: session_id
        type: string
      - description: Max results (default 500, max 2000)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.EventsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List events with filters
      tags:
      - events
  /v1/events/{id}/content:
    get:
      description: Returns prompt capture content for an event. Returns 404 when the
        event does not exist or capture was not enabled.
      parameters:
      - description: Event UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.EventContent'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get event content
      tags:
      - events
  /v1/fleet:
    get:
      description: Returns sessions grouped by flavor, excluding lost sessions. Includes
        runtime context facets aggregated across all non-terminal sessions for the
        dashboard CONTEXT sidebar.
      parameters:
      - description: Max sessions to return (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Offset into sessions list (default 0)
        in: query
        name: offset
        type: integer
      - description: 'Filter by agent type: ''developer'', ''production'', or empty
          for all'
        in: query
        name: agent_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FleetResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get fleet state
      tags:
      - fleet
  /v1/policies:
    get:
      description: Returns all token policies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Policy'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List policies
      tags:
      - policies
    post:
      consumes:
      - application/json
      description: Creates a new token policy
      parameters:
      - description: Policy definition
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/handlers.PolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Policy'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create policy
      tags:
      - policies
  /v1/policies/{id}:
    delete:
      description: Deletes a token policy
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete policy
      tags:
      - policies
    put:
      consumes:
      - application/json
      description: Updates an existing token policy
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      - description: Policy definition
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/handlers.PolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Policy'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Update policy
      tags:
      - policies
  /v1/policy:
    get:
      description: 'Returns the most specific policy for a given flavor/session scope.
        Lookup order: session > flavor > org'
      parameters:
      - description: Agent flavor
        in: query
        name: flavor
        type: string
      - description: Session ID
        in: query
        name: session_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Policy'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get effective policy
      tags:
      - policies
  /v1/search:
    get:
      description: Searches agents, sessions, and events by partial match. Returns
        up to 5 results per group.
      parameters:
      - description: Search query (min 1, max 200 characters)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.SearchResults'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Cross-entity search
      tags:
      - search
  /v1/sessions/{id}:
    get:
      description: Returns session metadata (including effective policy thresholds)
        and all events in chronological order
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get session detail
      tags:
      - sessions
  /v1/stream:
    get:
      description: WebSocket connection for real-time fleet state updates. Upgrades
        HTTP to WebSocket.
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Real-time fleet stream
      tags:
      - stream
swagger: "2.0"
