name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Workflow-level least privilege: read-only by default. The two jobs
# that need wider scope override at the job level — publish-sensor
# (id-token: write for OIDC trusted PyPI publish), github-release
# (contents: write to create the release). publish-docker uses
# Docker Hub credentials from secrets and pushes images out to a
# third-party registry; it never needs the GITHUB_TOKEN's write
# scope, so leaving it on the workflow default closes the
# supply-chain gap a future compromised action in that job's step
# sequence would otherwise widen.
permissions:
  contents: read

jobs:
  publish-sensor:
    name: Publish flightdeck-sensor to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # Opt into Node 24 for every JavaScript-based action on this job
    # ahead of GitHub's 2026-06-02 default flip. KI24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        working-directory: sensor
        run: python -m build

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sensor/dist/
          # Idempotent publish: if a workflow re-run targets the same
          # tag (e.g. retrying a release after a downstream Docker
          # build failure) the version already exists on PyPI and
          # would otherwise hard-fail the job. ``skip-existing: true``
          # turns that into a no-op so publish-docker and
          # github-release can still execute on the rerun.
          skip-existing: true

  publish-docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: publish-sensor
    # Declaring an environment causes GitHub to record a Deployment
    # for this job, which surfaces it in the repo Deployments panel
    # alongside the ``pypi`` deployment created by publish-sensor.
    # Without this block the four Docker Hub publishes are invisible
    # to anyone scanning the panel for "where did v0.2.0 ship?". One
    # environment covers all four images because they all push to the
    # same flightdeckhq Docker Hub namespace from the same job.
    environment:
      name: docker-hub
      url: https://hub.docker.com/u/flightdeckhq
    # KI24: opt this job's JavaScript actions (checkout, login-action,
    # setup-buildx, build-push-action) into Node 24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ingestion
        uses: docker/build-push-action@v6
        with:
          context: ./ingestion
          push: true
          tags: |
            flightdeckhq/flightdeck-ingestion:${{ steps.version.outputs.VERSION }}
            flightdeckhq/flightdeck-ingestion:latest

      - name: Build and push workers
        uses: docker/build-push-action@v6
        with:
          context: ./workers
          push: true
          tags: |
            flightdeckhq/flightdeck-workers:${{ steps.version.outputs.VERSION }}
            flightdeckhq/flightdeck-workers:latest

      # pricing.yaml is the canonical source of truth at the repo root
      # (D102). api/Dockerfile bakes it into the image at
      # /etc/flightdeck/pricing.yaml via `COPY pricing.yaml ...`, which
      # resolves relative to the Docker build context. The context
      # below is ./api, so stage the file into the context without
      # relocating the source of truth or broadening the context to
      # the whole repo. The runner's working tree is ephemeral, so the
      # staged copy is discarded at the end of the job.
      - name: Stage pricing.yaml into api build context
        run: cp pricing.yaml api/pricing.yaml

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            flightdeckhq/flightdeck-api:${{ steps.version.outputs.VERSION }}
            flightdeckhq/flightdeck-api:latest

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          push: true
          tags: |
            flightdeckhq/flightdeck-dashboard:${{ steps.version.outputs.VERSION }}
            flightdeckhq/flightdeck-dashboard:latest

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-sensor, publish-docker]
    permissions:
      contents: write
    # KI24: opt this job's JavaScript actions (checkout, action-gh-release)
    # into Node 24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
