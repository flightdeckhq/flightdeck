name: CI

on:
  pull_request:
    branches: [main]
  # Push trigger is main-only. PR sync is itself a push event, so any
  # `feat/**` (or wildcard) addition here would fire CI twice on every
  # PR commit — once via this push trigger, once via pull_request:
  # synchronize. The pull_request trigger above already gives every
  # feature-branch PR commit pre-merge CI feedback; main-only push
  # then handles the post-merge run on the default branch.
  push:
    branches: [main]

# Workflow-level least privilege. Every job inherits ``contents: read``
# only — enough to clone the repo via actions/checkout, nothing more.
# No job in this workflow writes to the repo, creates issues / PRs /
# releases, pushes images, or uses OIDC, so there is no need to grant
# anything wider. A future job that needs more should override at the
# job level rather than widening the workflow default.
permissions:
  contents: read

# Cap blast radius from rapid-fire pushes on the same branch: cancel
# any in-flight run when a newer commit lands. Two pushes in quick
# succession should not boot two parallel Compose stacks (integration
# + e2e jobs each spin up a full dev stack).
concurrency:
  # Namespace by workflow name so a future workflow that picks the
  # same ref-keyed group doesn't accidentally cancel CI runs. Low-cost
  # future-proofing (the repo currently has just CI + release).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sensor:
    name: Sensor (Python)
    runs-on: ubuntu-latest
    # Opt into Node 24 for every JavaScript-based action on this job
    # ahead of GitHub's 2026-06-02 default flip. KI24 -- suppresses
    # the "Node.js 20 actions are deprecated" runner annotations on
    # actions/checkout, setup-python, upload-artifact, etc.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: sensor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install directly into the actions/setup-python interpreter --
      # NOT into a fresh sensor/.venv. A previous attempt to mirror the
      # local-dev venv layout in CI segfaulted pytest under --cov on
      # the GHA Linux x86_64 runner during collection: identical
      # package set as the system install, but the venv-installed
      # variant crashes the coverage tracer (likely a C-extension
      # RPATH interaction in the heavy onnxruntime/protobuf chain
      # pulled in transitively via crewai). System pip-install is the
      # configuration that worked through every prior green run; keep
      # it that way.
      - name: Install dependencies
        run: pip install -e ".[dev,anthropic,openai]"

      - name: mypy --strict
        run: mypy flightdeck_sensor/ --strict

      - name: ruff check
        run: ruff check flightdeck_sensor/

      - name: Test with coverage
        run: |
          pytest tests/ -v \
            --cov=flightdeck_sensor \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload sensor coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-sensor
          path: sensor/htmlcov/
          retention-days: 14

  go:
    name: Go (ingestion, workers, api)
    runs-on: ubuntu-latest
    # KI24: opt this job's JavaScript actions into Node 24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Install golangci-lint v2
        # Pinned to an immutable commit SHA (not a tag like @v2.11.4)
        # because tags can be re-pointed by anyone with push access to
        # the upstream repo without changing the version string. SHA
        # is the only anchor that survives an upstream tag rewrite.
        # Bump deliberately; keep the tag name in the comment for
        # human readability. Current pin: v2.11.4 (8f3b0c7e).
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@8f3b0c7ed018e57905fbd873c697e0b1ede605a5

      - name: Lint ingestion
        working-directory: ingestion
        run: golangci-lint run ./... --timeout=5m

      - name: Lint workers
        working-directory: workers
        run: golangci-lint run ./... --timeout=5m

      - name: Lint api
        working-directory: api
        run: golangci-lint run ./... --timeout=5m

      - name: Test ingestion
        working-directory: ingestion
        run: |
          go test ./... -v -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/handlers/...

      - name: Check ingestion coverage threshold
        run: |
          cd ingestion
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | sed 's/%//')
          echo "Ingestion coverage (handlers): ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 67" | bc -l) )); then
            echo "FAIL: ${COVERAGE}% below 67%"
            exit 1
          fi
          echo "PASS: ${COVERAGE}% meets 67%"

      - name: Print ingestion coverage summary
        run: |
          cd ingestion
          go tool cover -func=coverage.out | tail -20

      - name: Generate ingestion HTML report
        if: always()
        run: |
          cd ingestion
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload ingestion coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ingestion
          path: ingestion/coverage.html
          retention-days: 14

      - name: Test workers
        working-directory: workers
        run: |
          go test ./... -v -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/...

      - name: Report workers coverage (no threshold)
        run: |
          cd workers
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}')
          echo "Workers coverage: ${COVERAGE}"
          echo "No threshold -- SQL paths covered by integration tests."
          go tool cover -func=coverage.out | tail -20

      - name: Generate workers HTML report
        if: always()
        run: |
          cd workers
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload workers coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-workers
          path: workers/coverage.html
          retention-days: 14

      - name: Test api
        working-directory: api
        run: |
          # Run every test package, not just ./tests/, so handler-package
          # tests in api/internal/handlers/ (mcp_policy_test.go,
          # mcp_policy_apply_template_test.go, mcp_policy_audit_log_test.go,
          # mcp_policy_metrics_templates_test.go, whoami_test.go) execute
          # and contribute to handler coverage. Restricting to ./tests/
          # left those files compiled-but-unrun, dragging the gate from
          # 67% to 52% on feat/mcp-protection-policy until PR #33.
          go test ./... -v -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/handlers/...

      - name: Check api coverage threshold
        run: |
          cd api
          COVERAGE=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | sed 's/%//')
          echo "API coverage (handlers): ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 66" | bc -l) )); then
            echo "FAIL: ${COVERAGE}% below 66%"
            exit 1
          fi
          echo "PASS: ${COVERAGE}% meets 66%"

      - name: Print api coverage summary
        run: |
          cd api
          go tool cover -func=coverage.out | tail -20

      - name: Generate api HTML report
        if: always()
        run: |
          cd api
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload api coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: api/coverage.html
          retention-days: 14

  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    # KI24: opt this job's JavaScript actions into Node 24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      # ---- Production image smoke ---------------------------------
      #
      # Build the multi-stage dashboard image (Node build → nginx-
      # alpine), run it standalone, and assert that
      # /runtime-config.json carries the strict cache-discipline
      # header pack on both 200 and 4xx responses. Permanent
      # regression protection on dashboard/nginx.conf — a future edit
      # that weakens the headers fails this step and blocks the PR.
      #
      # Why this lives here, not in integration / e2e: those jobs use
      # the docker-compose.dev.yml override which swaps the dashboard
      # image for ``vite dev`` running in a node:20-alpine container.
      # vite serves the file but emits its own default
      # ``Cache-Control: no-cache`` header — the strict triplet only
      # ships when the actual dashboard nginx config is in play. So
      # the smoke must build the multi-stage image directly.

      - name: Build dashboard production image
        # docker is preinstalled on ubuntu-latest runners.
        # working-directory: dashboard inherits from defaults above,
        # so the context is `.` (the dashboard directory).
        run: docker build -t flightdeck-dashboard-smoke .

      - name: Run dashboard image
        run: |
          docker run -d --name dashboard-smoke \
            -p 13000:3000 \
            flightdeck-dashboard-smoke

      - name: Wait for nginx ready
        # Bounded retry loop. Status check is pinned to 200 (not just
        # "any 2xx via curl -f") so a transient redirect during
        # startup can't satisfy the readiness gate before the
        # assertion steps run.
        run: |
          for i in $(seq 1 30); do
            code=$(curl -o /dev/null -w '%{http_code}' -s http://localhost:13000/runtime-config.json || echo "000")
            if [ "$code" = "200" ]; then
              echo "ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: nginx did not become ready within 30 s"
          docker logs dashboard-smoke || true
          exit 1

      - name: Assert headers on 200 (GET /runtime-config.json)
        # Triplet + Pragma + Expires must all appear on the success
        # path. Negative assertions guard against ``expires off`` →
        # ``expires 1h`` slippage (would inject a conflicting
        # ``Cache-Control: max-age=…`` directive alongside the
        # required ones, OR a non-zero ``Expires:``). Either is a
        # regression the substring assertions would otherwise miss.
        # Header values are kept in lock-step with
        # ``dashboard/nginx.conf`` — that file carries a pointer
        # comment to this step so future editors see the contract.
        run: |
          set -e
          headers=$(curl -sI http://localhost:13000/runtime-config.json)
          echo "--- headers ---"
          echo "$headers"
          echo "$headers" | grep -qi 'Cache-Control: no-store, no-cache, must-revalidate'
          echo "$headers" | grep -qi 'Pragma: no-cache'
          echo "$headers" | grep -qi 'Expires: 0'
          if echo "$headers" | grep -qi 'max-age'; then
            echo "FAIL: Cache-Control must not include max-age"
            exit 1
          fi
          if echo "$headers" | grep -qiE 'Expires: [^0]'; then
            echo "FAIL: Expires must be exactly 0"
            exit 1
          fi

      - name: Assert headers on 405 (POST /runtime-config.json)
        # Verifies the ``always`` parameter on every add_header
        # directive. Status check uses ``curl -w '%{http_code}'``
        # rather than grepping the status line so the assertion isn't
        # coupled to ``HTTP/1.1`` (a future image upgrade enabling
        # HTTP/2 plain-text would silently break a status-line grep).
        run: |
          set -e
          code=$(curl -o /dev/null -w '%{http_code}' -s -X POST http://localhost:13000/runtime-config.json)
          headers=$(curl -sI -X POST http://localhost:13000/runtime-config.json)
          echo "--- headers ---"
          echo "$headers"
          if [ "$code" != "405" ]; then
            echo "FAIL: expected 405, got $code"
            exit 1
          fi
          echo "$headers" | grep -qi 'Cache-Control: no-store, no-cache, must-revalidate'
          echo "$headers" | grep -qi 'Pragma: no-cache'
          echo "$headers" | grep -qi 'Expires: 0'
          if echo "$headers" | grep -qi 'max-age'; then
            echo "FAIL: Cache-Control must not include max-age on error responses"
            exit 1
          fi
          if echo "$headers" | grep -qiE 'Expires: [^0]'; then
            echo "FAIL: Expires must be exactly 0 on error responses"
            exit 1
          fi

      - name: Resolve a representative hashed asset
        # Vite emits hashed filenames under /assets/ (e.g.
        # index-<hash>.js). The smoke needs a real one to hit the
        # asset-serving path operators see; ``docker exec ls`` gives
        # the canonical list inside the image. Asserting against
        # whatever happens to land first is fine because the cache
        # contract is uniform across the directory — every file
        # under /assets/ shares the same nginx location block.
        id: asset
        run: |
          set -e
          name=$(docker exec dashboard-smoke ls /usr/share/nginx/html/assets/ | head -1)
          if [ -z "$name" ]; then
            echo "FAIL: /usr/share/nginx/html/assets/ is empty in the built image"
            exit 1
          fi
          echo "asset=$name" >> "$GITHUB_OUTPUT"
          echo "Selected asset: $name"

      - name: Assert single normalized Cache-Control on 200 (GET /assets/...)
        # Hashed bundles are immutable by design — the file URL
        # changes whenever the content changes. The contract is one
        # ``Cache-Control: public, max-age=31536000, immutable``
        # header, full stop. The defective pre-fix shape was two
        # Cache-Control headers (``max-age=…`` from ``expires 1y``
        # plus ``public, immutable`` from add_header) — the count
        # assertion below catches any regression to that pattern.
        # No ``Expires:`` header should ship — ``expires off``
        # disables nginx's auto-emission so only our explicit
        # add_header value lands.
        run: |
          set -e
          asset='${{ steps.asset.outputs.asset }}'
          headers=$(curl -sI "http://localhost:13000/assets/${asset}")
          echo "--- headers ---"
          echo "$headers"
          cc_count=$(echo "$headers" | grep -ci '^Cache-Control:')
          if [ "$cc_count" != "1" ]; then
            echo "FAIL: expected exactly one Cache-Control header, got $cc_count"
            exit 1
          fi
          echo "$headers" | grep -qi '^Cache-Control: public, max-age=31536000, immutable'
          if echo "$headers" | grep -qi '^Expires:'; then
            echo "FAIL: /assets/ must not ship an Expires header"
            exit 1
          fi

      - name: Assert headers on 405 (POST /assets/...)
        # Verifies the ``always`` parameter on /assets/ — the cache
        # discipline must hold on error responses too, otherwise a
        # 404 or 405 from a missing asset could be cached forever
        # under one rule and never under another.
        run: |
          set -e
          asset='${{ steps.asset.outputs.asset }}'
          code=$(curl -o /dev/null -w '%{http_code}' -s -X POST "http://localhost:13000/assets/${asset}")
          headers=$(curl -sI -X POST "http://localhost:13000/assets/${asset}")
          echo "--- headers ---"
          echo "$headers"
          if [ "$code" != "405" ]; then
            echo "FAIL: expected 405, got $code"
            exit 1
          fi
          cc_count=$(echo "$headers" | grep -ci '^Cache-Control:')
          if [ "$cc_count" != "1" ]; then
            echo "FAIL: expected exactly one Cache-Control header on 405, got $cc_count"
            exit 1
          fi
          echo "$headers" | grep -qi '^Cache-Control: public, max-age=31536000, immutable'

      - name: Assert dashboard image runs as non-root
        # USER nginx in the Dockerfile drops the master process from
        # root (uid 0) to nginx (uid 101). Verifying via ``id`` is
        # the simplest contract the assertion can carry — the
        # specific UID isn't load-bearing, only that it's NOT 0.
        run: |
          set -e
          uid=$(docker exec dashboard-smoke id -u)
          echo "Container UID: $uid"
          if [ "$uid" = "0" ]; then
            echo "FAIL: dashboard image must not run as root"
            exit 1
          fi

      - name: Dump dashboard image logs on failure
        if: failure()
        run: docker logs dashboard-smoke || true

      - name: Tear down dashboard image
        if: always()
        run: docker rm -f dashboard-smoke || true

  plugin:
    name: Plugin (Claude Code, node --test)
    runs-on: ubuntu-latest
    # KI24: opt this job's JavaScript actions into Node 24.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      # The plugin is zero-dep (`agent_id.mjs` / `uuid5.mjs` /
      # `mcp_identity.mjs` use only Node built-ins — node:crypto,
      # node:test, the URL global, process.env). No npm install
      # step needed; the make target invokes `node --test` directly
      # against tests/*.test.mjs.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Plugin unit tests
        run: make test-plugin

  integration:
    name: Integration + sensor e2e
    runs-on: ubuntu-latest
    needs: [sensor, go, dashboard, plugin]
    # KI24: opt this job's JavaScript actions into Node 24.
    #
    # PYTHON: the Makefile defaults $(PYTHON) to
    # ./sensor/.venv/bin/python (D124 single-venv discipline for local
    # dev). CI uses actions/setup-python directly without a project
    # venv, so we override here at the job level — every Make target
    # invoked below ($(PYTHON), $(MAKE) -C sensor, etc.) inherits this
    # without per-step overrides. One env-var, no per-step trap.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHON: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sensor with dev + provider extras
        working-directory: sensor
        run: pip install -e ".[dev,anthropic,openai]"

      - name: Boot the dev stack
        # `make dev` returns once all services have been instructed to
        # start. tests/integration/conftest.py:_wait_for_services then
        # polls the /health endpoints with a 60 s ceiling, so the
        # integration test process is responsible for waiting on the
        # stack -- the workflow does not need a separate readiness
        # probe here.
        run: make dev

      - name: Run integration tests (fabricated + sensor e2e)
        # Excludes manual tests via the -m "not manual" filter that
        # the test-integration target carries. test_ui_demo.py is
        # the only manual-marked test today; it is a 3-minute
        # dashboard data-population tool, not a regression test.
        #
        # The test_sensor_e2e.py file is part of the integration
        # directory, so its 20 e2e tests run inside this step. The
        # previous workflow had a separate "Run sensor e2e tests in
        # isolation" step that re-ran the same 20 tests via
        # ``make test-e2e``; it was removed in B-L because pytest
        # already prints per-test PASS/FAIL in this step's log and
        # the duplicate doubled the slowest CI stage with no
        # additional coverage. ``make test-e2e`` still works locally
        # for targeted runs.
        run: make test-integration

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml logs --tail=300 || true
          docker compose -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml ps || true

      - name: Tear down stack
        if: always()
        run: make down || true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [sensor, go, dashboard, plugin]
    # Rule 40c (Phase 3): browser end-to-end tests run parallel to
    # the integration job so neither blocks the other. The E2E job
    # boots its own stack — required because seeding the canonical
    # fixture dataset must happen against the same Postgres the
    # dashboard later queries, and multiple jobs sharing one stack
    # across runners isn't supported by ``make dev``.
    #
    # PYTHON: same job-level override as the integration job above —
    # the Makefile's $(PYTHON) default points at the local sensor/.venv
    # which CI doesn't create. ``make seed-e2e`` resolves through this.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHON: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sensor (required by seed.py's event-builder helpers)
        # tests/shared/fixtures.py imports
        # flightdeck_sensor.core.agent_id.derive_agent_id. Without the
        # install the seeder crashes before POSTing anything.
        working-directory: sensor
        run: pip install -e ".[dev,anthropic,openai]"

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Boot the dev stack
        run: make dev

      - name: Seed canonical E2E fixtures
        # Idempotent; runs here explicitly so a failure at seed time
        # surfaces as its own job step rather than hiding inside
        # Playwright's globalSetup stdout. globalSetup will re-run
        # (and skip) during the playwright test invocation below.
        run: make seed-e2e

      - name: Run Playwright tests (neon-dark + clean-light)
        working-directory: dashboard
        run: npx playwright test

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 14

      - name: Upload Playwright test-results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: dashboard/test-results/
          retention-days: 14

      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml logs --tail=300 || true
          docker compose -f docker/docker-compose.yml \
            -f docker/docker-compose.dev.yml ps || true

      - name: Tear down stack
        if: always()
        run: make down || true
