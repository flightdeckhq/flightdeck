{{- if .Values.nats.enabled -}}
{{- $component := "nats" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "flightdeck.componentName" (dict "root" . "component" $component) }}
  labels:
    {{- include "flightdeck.labels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  serviceName: {{ include "flightdeck.natsServiceName" . }}
  replicas: {{ .Values.nats.replicas }}
  selector:
    matchLabels:
      {{- include "flightdeck.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "flightdeck.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
      {{- with .Values.nats.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "flightdeck.serviceAccountName" (dict "root" . "component" $component) }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nats
          image: "{{ .Values.image.registry }}/{{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # JetStream enabled via CLI flag so NATS works without a config
          # file. Matches docker/docker-compose.yml behaviour.
          args:
            - "--jetstream"
            - "--store_dir"
            - "/data"
            - "--http_port"
            - "{{ .Values.nats.monitorPort }}"
            - "--port"
            - "{{ .Values.nats.clientPort }}"
            - "--name"
            - "$(POD_NAME)"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: client
              containerPort: {{ .Values.nats.clientPort }}
              protocol: TCP
            - name: monitor
              containerPort: {{ .Values.nats.monitorPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- with .Values.nats.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nats.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nats.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.nats.jetstream.fileStore.storageClassName }}
        storageClassName: {{ .Values.nats.jetstream.fileStore.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nats.jetstream.fileStore.size }}
{{- end }}
