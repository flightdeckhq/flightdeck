server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Runtime token configuration. Operators rotate the dashboard's
    # bearer token by replacing this file (typically a volume mount
    # at /usr/share/nginx/html/runtime-config.json) and reloading
    # nginx — no rebuild. Cache-Control prevents intermediaries from
    # serving a stale token after rotation.
    location = /runtime-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }
}
