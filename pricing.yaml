# Flightdeck model pricing table.
#
# Prices are USD per 1,000,000 tokens, taken from provider public list
# prices. Last verified: 2026-04-17.
#
# To add or update an entry: see CONTRIBUTING.md ("Updating pricing
# data"). Include a link to the provider's pricing page in your PR.
#
# Cache ratios (uniform across all models that report cache tokens):
#   cache_read     = input * 0.10  (90% discount)
#   cache_creation = input * 1.25  (25% premium)
# These ratios are applied in api/internal/store/pricing.go. If a
# provider ever publishes different ratios, open an issue first -- it
# requires a code-level schema change, not a pricing.yaml edit.
#
# `provider` must be one of: anthropic, openai, google, xai, mistral,
# meta, other. `input` and `output` must be >= 0. `model_id` is the
# exact string the sensor emits on events.model. Duplicates are
# rejected at load time.

