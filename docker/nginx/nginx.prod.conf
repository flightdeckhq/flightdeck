# Production nginx config. Paired with docker/docker-compose.prod.yml.
#
# Listens on 443 with TLS and redirects 80 -> 443. Routes:
#   /          -> dashboard:3000
#   /api/      -> api:8081           (strip /api/ prefix)
#   /ingest/   -> ingestion:8080     (strip /ingest/ prefix)
# Matches nginx.dev.conf. The only behavioural delta is TLS + headers.
#
# Certs are expected at:
#   /etc/nginx/certs/fullchain.pem
#   /etc/nginx/certs/privkey.pem
# Mounted read-only from the host by docker-compose.prod.yml. Certbot
# produces these filenames by default (symlink from /etc/letsencrypt/
# live/<domain>/).
#
# HSTS is set to max-age=31536000 with includeSubDomains but NOT
# preload -- opting into the preload list is the operator's call and
# is hard to reverse.

upstream dashboard {
    server dashboard:3000;
}

upstream api {
    server api:8081;
}

upstream ingestion {
    server ingestion:8080;
}

# HTTP -> HTTPS redirect. 301 because the redirect target is stable
# (the operator owns the domain and we are telling browsers to remember
# the HTTPS endpoint). An ACME HTTP-01 challenge path is left servable
# on port 80 for certbot renewals that rely on standalone HTTP.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Mozilla "intermediate" compatibility profile. Drops SSLv3, TLSv1,
    # TLSv1.1. Leaves TLSv1.2 + TLSv1.3 with modern AEAD ciphers only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers. HSTS locks the browser to HTTPS for a year;
    # includeSubDomains covers any subdomain the operator later wires
    # up. Not opted into the preload list -- reversing a preload
    # submission is expensive, so that choice is left to the operator.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Retry upstream on connection errors -- safety net during rolling
    # restarts when a single backend replica goes down briefly.
    proxy_connect_timeout 2s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 10;
    proxy_next_upstream_timeout 30s;

    # Dashboard (static assets). The image itself serves via nginx on
    # port 3000 with SPA fallback; we just proxy through. No WebSocket
    # endpoints are exposed at / -- WS lives under /api/v1/stream -- so
    # the Upgrade/Connection headers are deliberately absent here.
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Query API. /api/v1/stream carries the WebSocket used for real-
    # time fleet updates; the Upgrade/Connection headers plus the
    # long proxy_read_timeout keep that channel open for 24 hours.
    location /api/ {
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Ingestion API. Raises the default 1m request body limit to 10m
    # because prompt-capture payloads (long assistant responses, tool
    # results from Read on a big file or bash dumping output) can
    # exceed 1m on legitimate traffic. 10m is a generous ceiling that
    # still rejects pathological bodies, and it matches the rough
    # upper bound of a single realistic event payload.
    location /ingest/ {
        client_max_body_size 10m;
        proxy_pass http://ingestion/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
