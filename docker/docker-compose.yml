services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flightdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flightdeck_dev}
      POSTGRES_DB: ${POSTGRES_DB:-flightdeck}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flightdeck}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # NATS runs unauthenticated in dev on purpose: `make dev` is a
  # single-host developer loop and a token/NKey round-trip just
  # complicates the feedback cycle. Prod NATS auth (Helm chart +
  # docker-compose.prod.yml) is on the Roadmap in README.md under
  # "Production deployment hardening". See DECISIONS.md D047.
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  ingestion:
    image: flightdeckhq/flightdeck-ingestion:latest
    environment:
      FLIGHTDECK_PORT: "8080"
      FLIGHTDECK_POSTGRES_URL: postgres://flightdeck:flightdeck_dev@postgres:5432/flightdeck?sslmode=disable
      FLIGHTDECK_NATS_URL: nats://nats:4222
      FLIGHTDECK_ENV: development
      # D095: tok_dev is only accepted when ENVIRONMENT=dev. The dev
      # compose deliberately opts in; production deployments omit this
      # env var so the seed token becomes inert.
      ENVIRONMENT: dev
      SHUTDOWN_TIMEOUT_SECS: "30"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  workers:
    image: flightdeckhq/flightdeck-workers:latest
    environment:
      FLIGHTDECK_POSTGRES_URL: postgres://flightdeck:flightdeck_dev@postgres:5432/flightdeck?sslmode=disable
      FLIGHTDECK_NATS_URL: nats://nats:4222
      FLIGHTDECK_WORKER_POOL_SIZE: "10"
      SHUTDOWN_TIMEOUT_SECS: "30"
      FLIGHTDECK_MIGRATIONS_DIR: /migrations
    volumes:
      - ./postgres/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  api:
    image: flightdeckhq/flightdeck-api:latest
    environment:
      FLIGHTDECK_PORT: "8081"
      FLIGHTDECK_POSTGRES_URL: postgres://flightdeck:flightdeck_dev@postgres:5432/flightdeck?sslmode=disable
      FLIGHTDECK_ENV: development
      # D095: tok_dev only works when ENVIRONMENT=dev.
      ENVIRONMENT: dev
      SHUTDOWN_TIMEOUT_SECS: "30"
    volumes:
      # D102: mount the repo-level pricing.yaml into the production
      # default path so a dev operator can edit prices and restart the
      # api without rebuilding the image. Production deployments that
      # use the baked-in copy instead can drop this mount.
      - ../pricing.yaml:/etc/flightdeck/pricing.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  dashboard:
    image: flightdeckhq/flightdeck-dashboard:latest
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "4000:4000"
    depends_on:
      api:
        condition: service_healthy
      ingestion:
        condition: service_healthy
      dashboard:
        condition: service_started

volumes:
  postgres_data:
  nats_data:
