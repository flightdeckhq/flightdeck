        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Get effective policy
      tags:
      - policies
  /v1/search:
    get:
      description: Searches agents, sessions, and events by partial match. Returns
        up to 5 results per group.
      parameters:
      - description: Search query (min 1, max 200 characters)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.SearchResults'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Cross-entity search
      tags:
      - search
  /v1/sessions:
    get:
      description: Returns sessions matching time range, state, flavor, model, and
        search filters with pagination and sort support.
      parameters:
      - description: Full-text search across flavor, host, model, hostname, os, git_branch
        in: query
        name: q
        type: string
      - description: 'Start time (ISO 8601, default: 7 days ago)'
        in: query
        name: from
        type: string
      - description: 'End time (ISO 8601, default: now)'
        in: query
        name: to
        type: string
      - description: 'Filter by state (repeatable: active, idle, stale, closed, lost)'
        in: query
        name: state
        type: string
      - description: Filter by flavor (repeatable)
        in: query
        name: flavor
        type: string
      - description: 'Filter by framework name/version matching sessions.context.frameworks[]
          (repeatable: langgraph/1.1.6, crewai/1.14.1, ...)'
        in: query
        name: framework
        type: string
      - description: Filter by model
        in: query
        name: model
        type: string
      - description: 'Sort field: started_at, duration, tokens_used, flavor (default:
          started_at)'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc, desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Max results (default 25, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_flightdeckhq_flightdeck_api_internal_store.SessionsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: List sessions with filters, search, and pagination
      tags:
      - sessions
  /v1/sessions/{id}:
    get:
      description: Returns session metadata (including effective policy thresholds)
        and all events in chronological order
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Get session detail
      tags:
      - sessions
  /v1/stream:
    get:
      description: WebSocket connection for real-time fleet state updates. Upgrades
        HTTP to WebSocket. Accepts bearer token via the Authorization header OR ``?token=``
        query parameter (browsers cannot set headers on the WS upgrade).
      parameters:
      - description: Bearer token, alternative to Authorization header
        in: query
        name: token
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.ErrorResponse'
      summary: Real-time fleet stream
      tags:
      - stream
