server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed bundles emitted by Vite (``index-<hash>.js`` / ``-<hash>.css``
    # / fonts under /assets/). Filenames carry a content hash so any
    # change ships under a new path; the existing path can be cached
    # forever. ``expires off`` disables nginx's automatic
    # Cache-Control + Expires emission so our explicit ``add_header``
    # is the sole source — without it nginx would also emit
    # ``Cache-Control: max-age=…`` from the expires module, producing
    # two Cache-Control headers in the response (HTTP-spec-ambiguous
    # under merging rules; some intermediaries pick the first, some
    # the last). The ``always`` parameter ensures the header ships on
    # 4xx/5xx too.
    #
    # Regression-tested by the Dashboard CI job's production-image
    # smoke steps in .github/workflows/ci.yml — that job hits a
    # representative hashed asset and asserts exactly one
    # Cache-Control header with the value below.
    location /assets/ {
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Runtime token configuration. Operators rotate the dashboard's
    # bearer token by replacing this file (typically a volume mount
    # at /usr/share/nginx/html/runtime-config.json) and reloading
    # nginx — no rebuild. The strict cache triplet prevents
    # intermediaries from serving a stale token after rotation.
    #
    # Regression-tested by the Dashboard CI job's production-image
    # smoke steps in .github/workflows/ci.yml — those steps build
    # this image, hit /runtime-config.json on both 200 and 405, and
    # assert each add_header value below verbatim. A reviewer
    # changing one of these directives must update the matching
    # assertion in the workflow or the job fails.
    #
    #   - Cache-Control: no-store forces caches to discard the
    #     response after delivery (HTTP/1.1).
    #   - Cache-Control: no-cache requires revalidation on every
    #     request (HTTP/1.1, redundant with no-store but explicit).
    #   - Cache-Control: must-revalidate forbids serving a stale
    #     entry under any disconnected-origin edge case.
    #   - Pragma: no-cache covers HTTP/1.0 intermediaries that
    #     ignore Cache-Control entirely.
    #   - Expires: 0 covers HTTP/1.0 caches that respect Expires.
    # ``expires off`` disables nginx's automatic Cache-Control /
    # Expires emission so our explicit add_header values are the
    # only ones in the response (otherwise nginx would inject its
    # own headers and duplicate / conflict with ours). The
    # ``always`` parameter ensures these headers ship on 4xx/5xx
    # responses too — a 404 / 500 from a misconfigured prod mount
    # must not leave a cacheable error in flight.
    location = /runtime-config.json {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
