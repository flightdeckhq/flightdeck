{{- $component := "ingestion" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "flightdeck.componentName" (dict "root" . "component" $component) }}
  labels:
    {{- include "flightdeck.labels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  type: {{ .Values.ingestion.service.type }}
  selector:
    {{- include "flightdeck.selectorLabels" (dict "root" . "component" $component) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ingestion.service.port }}
      targetPort: http
      protocol: TCP
