name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  sensor:
    name: Sensor (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sensor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,anthropic,openai]"

      - name: mypy --strict
        run: mypy flightdeck_sensor/ --strict

      - name: ruff check
        run: ruff check flightdeck_sensor/

      - name: Test with coverage
        run: |
          pytest tests/ -v \
            --cov=flightdeck_sensor \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload sensor coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sensor/coverage.xml
          flags: sensor
          fail_ci_if_error: false

  go:
    name: Go (ingestion, workers, api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint ingestion
        working-directory: ingestion
        run: golangci-lint run ./... --timeout=5m

      - name: Lint workers
        working-directory: workers
        run: golangci-lint run ./... --timeout=5m

      - name: Lint api
        working-directory: api
        run: golangci-lint run ./... --timeout=5m

      - name: Test ingestion
        working-directory: ingestion
        run: |
          go test ./tests/... -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/...

      - name: Test workers
        working-directory: workers
        run: |
          go test ./tests/... -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/...

      - name: Test api
        working-directory: api
        run: |
          go test ./tests/... -v \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/...

      - name: Upload ingestion coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ingestion/coverage.out
          flags: ingestion
          fail_ci_if_error: false

      - name: Upload workers coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: workers/coverage.out
          flags: workers
          fail_ci_if_error: false

      - name: Upload API coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: api/coverage.out
          flags: api
          fail_ci_if_error: false

  dashboard:
    name: Dashboard (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test
