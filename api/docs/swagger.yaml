basePath: /
definitions:
  handlers.CreateAccessTokenRequest:
    properties:
      name:
        type: string
    type: object
  handlers.CustomDirectivesListResponse:
    properties:
      directives:
        items:
          $ref: '#/definitions/store.CustomDirective'
        type: array
    type: object
  handlers.DeleteCustomDirectivesResponse:
    properties:
      deleted:
        type: integer
    type: object
  handlers.DirectiveRequest:
    properties:
      action:
        type: string
      directive_name:
        type: string
      fingerprint:
        type: string
      flavor:
        type: string
      grace_period_ms:
        type: integer
      parameters:
        type: object
      reason:
        type: string
      session_id:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  handlers.FleetResponse:
    properties:
      agents:
        items:
          $ref: '#/definitions/store.AgentSummary'
        type: array
      context_facets:
        additionalProperties:
          items:
            $ref: '#/definitions/store.ContextFacetValue'
          type: array
        type: object
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
    type: object
  handlers.PolicyRequest:
    properties:
      block_at_pct:
        type: integer
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  handlers.RegisterDirectivesRequest:
    properties:
      directives:
        items:
          $ref: '#/definitions/store.CustomDirective'
        type: array
      flavor:
        type: string
    type: object
  handlers.RegisterDirectivesResponse:
    properties:
      registered:
        type: integer
    type: object
  handlers.RenameAccessTokenRequest:
    properties:
      name:
        type: string
    type: object
  handlers.SessionResponse:
    properties:
      attachments:
        items:
          type: string
        type: array
      events:
        items:
          $ref: '#/definitions/store.Event'
        type: array
      session:
        $ref: '#/definitions/store.Session'
    type: object
  handlers.SyncDirectivesRequest:
    properties:
      directives:
        items:
          properties:
            fingerprint:
              type: string
            name:
              type: string
          type: object
        type: array
      flavor:
        type: string
    type: object
  handlers.SyncDirectivesResponse:
    properties:
      unknown_fingerprints:
        items:
          type: string
        type: array
    type: object
  store.AccessTokenRow:
    properties:
      created_at:
        type: string
      id:
        type: string
      last_used_at:
        type: string
      name:
        type: string
      prefix:
        type: string
    type: object
  store.AgentListResponse:
    properties:
      agents:
        items:
          $ref: '#/definitions/store.AgentSummary'
        type: array
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  store.AgentSummary:
    properties:
      agent_id:
        type: string
      agent_name:
        type: string
      agent_type:
        type: string
      client_type:
        type: string
      first_seen_at:
        type: string
      hostname:
        type: string
      last_seen_at:
        type: string
      state:
        description: |-
          State rollup: "active" when any session under this agent is
          currently active; otherwise the most-recent session's state.
          Empty string when the agent has no sessions yet (freshly
          upserted agent row awaiting its first session linkage).
        type: string
      total_sessions:
        type: integer
      total_tokens:
        type: integer
      user:
        type: string
    type: object
  store.AnalyticsResponse:
    properties:
      granularity:
        type: string
      group_by:
        type: string
      metric:
        type: string
      partial_estimate:
        type: boolean
      range:
        type: string
      series:
        items:
          $ref: '#/definitions/store.AnalyticsSeries'
        type: array
      totals:
        $ref: '#/definitions/store.AnalyticsTotals'
    type: object
  store.AnalyticsSeries:
    properties:
      data:
        items:
          $ref: '#/definitions/store.DataPoint'
        type: array
      dimension:
        type: string
      total:
        type: number
    type: object
  store.AnalyticsTotals:
    properties:
      grand_total:
        type: number
      period_change_pct:
        type: number
    type: object
  store.ContextFacetValue:
    properties:
      count:
        type: integer
      value:
        type: string
    type: object
  store.CreatedAccessTokenResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      prefix:
        type: string
      token:
        type: string
    type: object
  store.CustomDirective:
    properties:
      description:
        type: string
      fingerprint:
        type: string
      flavor:
        type: string
      id:
        type: string
      last_seen_at:
        type: string
      name:
        type: string
      parameters: {}
      registered_at:
        type: string
    type: object
  store.DataPoint:
    properties:
      date:
        type: string
      value:
        type: number
    type: object
  store.Directive:
    properties:
      action:
        type: string
      degrade_to:
        type: string
      delivered_at:
        type: string
      flavor:
        type: string
      grace_period_ms:
        type: integer
      id:
        type: string
      issued_at:
        type: string
      issued_by:
        type: string
      payload:
        type: object
      reason:
        type: string
      session_id:
        type: string
    type: object
  store.Event:
    properties:
      event_type:
        type: string
      flavor:
        type: string
      has_content:
        type: boolean
      id:
        type: string
      latency_ms:
        type: integer
      model:
        type: string
      occurred_at:
        type: string
      payload:
        additionalProperties: {}
        type: object
      session_id:
        type: string
      tokens_cache_creation:
        description: D100
        type: integer
      tokens_cache_read:
        description: D100
        type: integer
      tokens_input:
        type: integer
      tokens_output:
        type: integer
      tokens_total:
        type: integer
      tool_name:
        type: string
    type: object
  store.EventContent:
    properties:
      captured_at:
        type: string
      event_id:
        type: string
      input: {}
      messages: {}
      model:
        type: string
      provider:
        type: string
      response: {}
      session_id:
        type: string
      system_prompt:
        type: string
      tools: {}
    type: object
  store.EventsResponse:
    properties:
      events:
        items:
          $ref: '#/definitions/store.Event'
        type: array
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  store.Policy:
    properties:
      block_at_pct:
        type: integer
      created_at:
        type: string
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      id:
        type: string
      scope:
        type: string
      scope_value:
        type: string
      token_limit:
        type: integer
      updated_at:
        type: string
      warn_at_pct:
        type: integer
    type: object
  store.ReconcileResult:
    properties:
      agents_scanned:
        type: integer
      agents_updated:
        type: integer
      counters_updated:
        additionalProperties:
          type: integer
        type: object
      duration_ms:
        type: integer
      errors:
        items:
          type: string
        type: array
    type: object
  store.SearchResultAgent:
    properties:
      agent_id:
        type: string
      agent_name:
        type: string
      agent_type:
        type: string
      last_seen:
        type: string
    type: object
  store.SearchResultEvent:
    properties:
      event_id:
        type: string
      event_type:
        type: string
      model:
        type: string
      occurred_at:
        type: string
      session_id:
        type: string
      tool_name:
        type: string
    type: object
  store.SearchResultSession:
    properties:
      context:
        additionalProperties: true
        type: object
      ended_at:
        type: string
      flavor:
        type: string
      host:
        type: string
      model:
        type: string
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_limit:
        type: integer
      tokens_used:
        type: integer
    type: object
  store.SearchResults:
    properties:
      agents:
        items:
          $ref: '#/definitions/store.SearchResultAgent'
        type: array
      events:
        items:
          $ref: '#/definitions/store.SearchResultEvent'
        type: array
      sessions:
        items:
          $ref: '#/definitions/store.SearchResultSession'
        type: array
    type: object
  store.Session:
    properties:
      agent_id:
        description: |-
          D115 identity columns (nullable for sessions that predate the
          migration OR for lazy-created rows whose authoritative
          session_start never arrived; UpsertSession's COALESCE
          enrichment promotes these from NULL to real values on the
          first session_start).
        type: string
      agent_name:
        type: string
      agent_type:
        type: string
      block_at_pct:
        type: integer
      capture_enabled:
        description: |-
          CaptureEnabled is true when at least one event in this session
          has has_content=true (i.e. prompt content was captured to
          event_content). Computed via EXISTS subquery so no schema
          change is required.
        type: boolean
      client_type:
        type: string
      context:
        additionalProperties: {}
        description: |-
          Runtime context collected by the sensor at init() time and
          stored once in sessions.context (JSONB) on the session_start
          event. Carries hostname, OS, git, orchestration, frameworks,
          etc. -- see sensor/flightdeck_sensor/core/context.py.
        type: object
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      ended_at:
        type: string
      flavor:
        type: string
      framework:
        type: string
      has_pending_directive:
        description: HasPendingDirective is true when an undelivered shutdown directive
          exists.
        type: boolean
      host:
        type: string
      last_seen_at:
        type: string
      model:
        type: string
      policy_token_limit:
        description: |-
          Active policy thresholds (nullable).
          Populated by GetSession via effective policy lookup.
          Null if no policy applies at any scope.
        type: integer
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_limit:
        type: integer
      token_name:
        description: |-
          TokenName is the human-readable name of the access_tokens row
          that authenticated the session_start event (D095). Nullable:
          tok_dev-authenticated sessions and pre-Phase-5 rows carry NULL.
          Preserved across token revocation (sessions.token_id clears via
          ON DELETE SET NULL but sessions.token_name is a static snapshot
          so the dashboard can attribute historical sessions even after
          the token row is gone). Mirrors the SessionListItem.TokenName
          returned by GetSessions.
        type: string
      tokens_used:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  store.SessionListItem:
    properties:
      agent_id:
        description: |-
          D115 identity (nullable for lazy-created rows awaiting an
          authoritative session_start).
        type: string
      agent_name:
        type: string
      agent_type:
        type: string
      capture_enabled:
        type: boolean
      client_type:
        type: string
      context:
        additionalProperties: true
        type: object
      duration_s:
        type: number
      ended_at:
        type: string
      error_types:
        description: |-
          ErrorTypes lists every distinct ``payload->'error'->>'error_type''
          observed across the session's ``llm_error`` events. Always
          present on the wire (empty array when the session has no
          errors) so dashboard code can treat the slice as
          non-nullable. Mirrors the ``frameworks`` JSONB-array surfacing
          shape: aggregated server-side via a correlated subquery on the
          listing query so the dashboard can render the ERROR TYPE facet
          and the row-level error indicator without a per-session
          follow-up fetch.
        items:
          type: string
        type: array
      flavor:
        type: string
      host:
        type: string
      last_seen_at:
        description: |-
          LastSeenAt is the most-recent activity timestamp on the session.
          For active/idle/stale/lost: max(events.occurred_at), projected
          through the worker's last_seen_at column. For closed: aligned
          with ended_at. Drives the Investigate "Last Seen" column
          (S-TBL-1) and is sortable via ?sort=last_seen_at.
        type: string
      model:
        type: string
      policy_event_types:
        description: |-
          PolicyEventTypes lists every distinct policy enforcement
          ``event_type`` observed in the session: any subset of
          ``policy_warn`` / ``policy_degrade`` / ``policy_block``.
          Always present on the wire (empty array when the session
          carries no policy events). Same surfacing pattern as
          ErrorTypes — correlated subquery on the listing query so the
          dashboard renders the POLICY facet and severity-ranked
          session-row indicator without a per-session follow-up fetch.
        items:
          type: string
        type: array
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_id:
        description: |-
          D095: attribution for the access_tokens row that opened this
          session. TokenID is nullable because revocation clears the FK
          (ON DELETE SET NULL); TokenName is preserved for auditability
          so the UI can still render "Created via: Staging K8s (revoked)"
          long after the token row is gone.
        type: string
      token_limit:
        type: integer
      token_name:
        type: string
      tokens_used:
        type: integer
    type: object
  store.SessionsResponse:
    properties:
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      sessions:
        items:
          $ref: '#/definitions/store.SessionListItem'
        type: array
      total:
        type: integer
    type: object
host: localhost:8081
info:
  contact: {}
  description: Fleet visibility, session history, and control plane for AI agent fleets
  title: Flightdeck Query API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/access-tokens:
    get:
      description: Returns every access_tokens row. Hash and salt are never exposed;
        the raw token itself is available only on the POST response at creation time
        (D095).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.AccessTokenRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List access tokens
      tags:
      - access-tokens
    post:
      consumes:
      - application/json
      description: Mints an opaque ftd_ bearer token. The plaintext token is returned
        exactly once in the response; the platform cannot recover it afterwards. See
        DECISIONS.md D095.
      parameters:
      - description: Token name
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAccessTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.CreatedAccessTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create an access token
      tags:
      - access-tokens
  /v1/access-tokens/{id}:
    delete:
      description: Deletes the access_tokens row. The seeded Development Token row
        is protected and returns 403. Sessions previously authenticated with the token
        keep their token_name for auditability (sessions.token_id is set to NULL via
        ON DELETE SET NULL). See DECISIONS.md D095.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Revoke an access token
      tags:
      - access-tokens
    patch:
      consumes:
      - application/json
      description: Updates the name field on the access_tokens row. Historical sessions
        keep their original token_name snapshot. The Development Token row is protected
        and returns 403.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      - description: New name
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/handlers.RenameAccessTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AccessTokenRow'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Rename an access token
      tags:
      - access-tokens
  /v1/admin/reconcile-agents:
    post:
      description: Scans every agents row and recomputes total_sessions, total_tokens,
        first_seen_at, and last_seen_at by querying the sessions table. Per-agent
        transaction; continues on per-agent error and surfaces the failures in the
        response body's errors array. Orphan agents (zero actual sessions) have their
        counters zeroed but first_seen_at and last_seen_at are preserved — agent-row
        cleanup is out of scope for this endpoint. Concurrent calls return 409; a
        207 indicates partial success (some per-agent errors). Intended for operator
        use when drift is suspected, not as a scheduled job.
      produces:
      - application/json
      responses:
        "200":
          description: Reconcile completed; errors array is empty
          schema:
            $ref: '#/definitions/store.ReconcileResult'
        "207":
          description: Reconcile completed with per-agent errors (see errors array)
          schema:
            $ref: '#/definitions/store.ReconcileResult'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Token is valid but lacks admin scope
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Another reconcile is already in progress
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Fatal database error (agent listing or pool exhaustion)
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Reconcile agent rollup counters against sessions ground truth
      tags:
      - admin
  /v1/agents:
    get:
      description: Returns agents matching the supplied filters. Multi-value filters
        (state, agent_type, client_type, hostname, user, os, orchestration) accept
        comma-separated values and repeated query params; values within a dimension
        are OR, values across dimensions are AND. ``search`` is a case-insensitive
        substring match against ``agent_name`` and ``hostname``. ``updated_since``
        filters on ``last_seen_at >= ts``. State is computed via LATERAL subquery
        against the most-recent session. Pagination defaults to 25/page, max 100.
      parameters:
      - description: 'Filter by agent_type (repeatable/comma: coding, production)'
        in: query
        name: agent_type
        type: string
      - description: 'Filter by client_type (repeatable/comma: claude_code, flightdeck_sensor)'
        in: query
        name: client_type
        type: string
      - description: 'Filter by rollup state (repeatable/comma: active, idle, stale,
          closed, lost)'
        in: query
        name: state
        type: string
      - description: Filter by hostname (repeatable/comma, exact match)
        in: query
        name: hostname
        type: string
      - description: Filter by user_name (repeatable/comma, exact match)
        in: query
        name: user
        type: string
      - description: Filter by sessions.context.os (EXISTS subquery; matches if ANY
          session had the OS)
        in: query
        name: os
        type: string
      - description: Filter by sessions.context.orchestration (EXISTS subquery)
        in: query
        name: orchestration
        type: string
      - description: Case-insensitive substring search on agent_name + hostname
        in: query
        name: search
        type: string
      - description: Filter to agents whose last_seen_at >= this ISO-8601 timestamp
        in: query
        name: updated_since
        type: string
      - description: 'Sort column (default: last_seen_at). One of: last_seen_at, first_seen_at,
          agent_name, total_sessions, total_tokens, state, user, hostname'
        in: query
        name: sort
        type: string
      - description: 'asc or desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Max results (default 25, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentListResponse'
        "400":
          description: Invalid filter value, sort column, order direction, or limit
            over 100
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List agents with filters, search, sort, and pagination
      tags:
      - agents
  /v1/agents/{agent_id}:
    get:
      description: Returns the full AgentSummary for a single agent including rollup
        counters and the LATERAL-computed rollup state. Powers the Investigate chip
        agent-name resolver so the UI no longer has to fall back to a UUID prefix
        when the filtered sessions list is empty.
      parameters:
      - description: Agent UUID
        in: path
        name: agent_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentSummary'
        "400":
          description: Invalid UUID format
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get agent detail by id
      tags:
      - agents
  /v1/analytics:
    get:
      description: Flexible GROUP BY analytics endpoint. Returns time series data
        grouped by dimension.
      parameters:
      - description: 'Metric: tokens, sessions, latency_avg, latency_p50, latency_p95,
          policy_events, estimated_cost (default: tokens)'
        in: query
        name: metric
        type: string
      - description: 'Dimension: flavor, model, framework, host, agent_type, team,
          provider (default: flavor)'
        in: query
        name: group_by
        type: string
      - description: 'Time range: today, 7d, 30d, 90d, custom (default: 30d)'
        in: query
        name: range
        type: string
      - description: Start time ISO 8601 (required when range=custom)
        in: query
        name: from
        type: string
      - description: End time ISO 8601 (required when range=custom)
        in: query
        name: to
        type: string
      - description: 'Granularity: hour, day, week (default: day)'
        in: query
        name: granularity
        type: string
      - description: Filter to specific flavor
        in: query
        name: filter_flavor
        type: string
      - description: Filter to specific model
        in: query
        name: filter_model
        type: string
      - description: Filter to specific agent_type
        in: query
        name: filter_agent_type
        type: string
      - description: Filter to specific provider (anthropic, openai, google, xai,
          mistral, meta, other)
        in: query
        name: filter_provider
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AnalyticsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Query analytics
      tags:
      - analytics
  /v1/directives:
    post:
      consumes:
      - application/json
      description: Issues a shutdown or custom directive to a single agent session
        or all sessions of a flavor
      parameters:
      - description: Directive definition
        in: body
        name: directive
        required: true
        schema:
          $ref: '#/definitions/handlers.DirectiveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Directive'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create directive
      tags:
      - directives
  /v1/directives/custom:
    delete:
      description: Deletes custom_directives rows where name LIKE prefix%. Intended
        for smoke test idempotency; not a production feature.
      parameters:
      - description: Name prefix to match (e.g. smoke_)
        in: query
        name: name_prefix
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DeleteCustomDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete custom directives by name prefix (dev/test only)
      tags:
      - custom-directives
    get:
      description: Returns all registered custom directives, optionally filtered by
        flavor.
      parameters:
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CustomDirectivesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List custom directives
      tags:
      - custom-directives
  /v1/directives/register:
    post:
      consumes:
      - application/json
      description: Registers custom directive definitions. Updates last_seen_at on
        conflict. Requires bearer token.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Registration request with directives
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RegisterDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Register custom directives
      tags:
      - custom-directives
  /v1/directives/sync:
    post:
      consumes:
      - application/json
      description: Checks which directive fingerprints are registered. Returns fingerprints
        not found. Requires bearer token.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Sync request with flavor and fingerprints
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SyncDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SyncDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Sync custom directive fingerprints
      tags:
      - custom-directives
  /v1/events:
    get:
      description: Returns events matching time range, flavor, event type, and session
        filters with pagination. Supports optional ``before`` keyset cursor and ``order``
        direction so the session drawer can paginate backwards in time when loading
        older events for long-running stable sessions.
      parameters:
      - description: Start time (ISO 8601)
        in: query
        name: from
        required: true
        type: string
      - description: End time (ISO 8601, defaults to now)
        in: query
        name: to
        type: string
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by session ID
        in: query
        name: session_id
        type: string
      - description: Keyset cursor (ISO 8601). When set, only rows with occurred_at
          < before are returned. Pair with order=desc for newest-first drawer pagination.
        in: query
        name: before
        type: string
      - description: 'Sort order: asc (default) or desc'
        in: query
        name: order
        type: string
      - description: Max results (default 500, max 2000)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.EventsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List events with filters
      tags:
      - events
  /v1/events/{id}/content:
    get:
      description: Returns prompt capture content for an event. Returns 404 when the
        event does not exist or capture was not enabled.
      parameters:
      - description: Event UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.EventContent'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get event content
      tags:
      - events
  /v1/fleet:
    get:
      description: Returns agents with aggregated state rollup and pagination. Includes
        runtime context facets aggregated across all non-terminal sessions for the
        dashboard CONTEXT sidebar.
      parameters:
      - description: Page number (1-based, default 1)
        in: query
        name: page
        type: integer
      - description: Rows per page (default 50, max 200)
        in: query
        name: per_page
        type: integer
      - description: 'Filter by D114 agent type: ''coding'', ''production'', or empty
          for all'
        in: query
        name: agent_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FleetResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get fleet state (agent-level, D115)
      tags:
      - fleet
  /v1/policies:
    get:
      description: Returns all token policies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.Policy'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List policies
      tags:
      - policies
    post:
      consumes:
      - application/json
      description: Creates a new token policy
      parameters:
      - description: Policy definition
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/handlers.PolicyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Policy'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create policy
      tags:
      - policies
  /v1/policies/{id}:
    delete:
      description: Deletes a token policy
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete policy
      tags:
      - policies
    put:
      consumes:
      - application/json
      description: Updates an existing token policy
      parameters:
      - description: Policy ID
        in: path
        name: id
        required: true
        type: string
      - description: Policy definition
        in: body
        name: policy
        required: true
        schema:
          $ref: '#/definitions/handlers.PolicyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Policy'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Update policy
      tags:
      - policies
  /v1/policy:
    get:
      description: 'Returns the most specific policy for a given flavor/session scope.
        Lookup order: session > flavor > org'
      parameters:
      - description: Agent flavor
        in: query
        name: flavor
        type: string
      - description: Session ID
        in: query
        name: session_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.Policy'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get effective policy
      tags:
      - policies
  /v1/search:
    get:
      description: Searches agents, sessions, and events by partial match. Returns
        up to 5 results per group.
      parameters:
      - description: Search query (min 1, max 200 characters)
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.SearchResults'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Cross-entity search
      tags:
      - search
  /v1/sessions:
    get:
      description: Returns sessions matching time range, state, flavor, client_type,
        agent_type, model, framework, agent_id, context-scalar (user/os/hostname/git_branch/orchestration/...),
        and search filters with pagination and sort support. Multi-value filters (state,
        flavor, client_type, framework, agent_type, context-scalar) accept repeated
        query params and comma-separated values; values within a dimension are OR,
        values across dimensions are AND. ``q`` is a case-insensitive substring search
        across agent_name, flavor, host, model, session_id, context.hostname, context.os,
        context.git_branch, context.python_version, and the frameworks array.
      parameters:
      - description: Full-text search across agent_name, flavor, host, model, session_id,
          context.hostname, context.os, context.git_branch, context.python_version,
          frameworks
        in: query
        name: q
        type: string
      - description: 'Start time (ISO 8601, default: 7 days ago)'
        in: query
        name: from
        type: string
      - description: 'End time (ISO 8601, default: now)'
        in: query
        name: to
        type: string
      - description: 'Filter by state (repeatable: active, idle, stale, closed, lost)'
        in: query
        name: state
        type: string
      - description: Filter by flavor (repeatable)
        in: query
        name: flavor
        type: string
      - description: Filter to a single agent (D115 UUID; deep-linked from the Fleet
          agent table and Investigate AGENT facet)
        in: query
        name: agent_id
        type: string
      - description: 'Filter by agent_type (repeatable: coding, production)'
        in: query
        name: agent_type
        type: string
      - description: 'Filter by client_type (repeatable: claude_code, flightdeck_sensor)'
        in: query
        name: client_type
        type: string
      - description: 'Filter by framework name/version matching sessions.context.frameworks[]
          (repeatable: langgraph/1.1.6, crewai/1.14.1, ...)'
        in: query
        name: framework
        type: string
      - description: Filter by model
        in: query
        name: model
        type: string
      - description: Filter by context.user (repeatable)
        in: query
        name: user
        type: string
      - description: Filter by context.os (repeatable)
        in: query
        name: os
        type: string
      - description: Filter by context.hostname (repeatable)
        in: query
        name: hostname
        type: string
      - description: Filter by context.arch (repeatable)
        in: query
        name: arch
        type: string
      - description: Filter by context.git_branch (repeatable)
        in: query
        name: git_branch
        type: string
      - description: Filter by context.git_repo (repeatable)
        in: query
        name: git_repo
        type: string
      - description: Filter by context.orchestration (repeatable)
        in: query
        name: orchestration
        type: string
      - description: 'Filter to sessions that emitted an llm_error event of one of
          the listed taxonomy values (repeatable/comma). 14-entry vocabulary: rate_limit,
          quota_exceeded, context_overflow, content_filter, invalid_request, authentication,
          permission, not_found, request_too_large, api_error, overloaded, timeout,
          stream_error, other.'
        in: query
        name: error_type
        type: string
      - description: 'Filter to sessions that emitted at least one policy enforcement
          event of the listed types (repeatable/comma). Vocabulary: policy_warn, policy_degrade,
          policy_block.'
        in: query
        name: policy_event_type
        type: string
      - description: 'Sort field: started_at, last_seen_at, duration, tokens_used,
          flavor, model, hostname, state (default: started_at). state sort uses severity
          ordinal active→idle→stale→lost→closed.'
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc, desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Max results (default 25, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.SessionsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List sessions with filters, search, and pagination
      tags:
      - sessions
  /v1/sessions/{id}:
    get:
      description: Returns session metadata (including effective policy thresholds)
        and events in chronological order. When ``events_limit`` is provided, the
        N newest events are returned (still sorted ASC); the drawer uses this to cap
        the initial fetch on long-running stable sessions.
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      - description: Return at most N newest events (1-1000). Omit for the full history.
        in: query
        name: events_limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get session detail
      tags:
      - sessions
  /v1/stream:
    get:
      description: WebSocket connection for real-time fleet state updates. Upgrades
        HTTP to WebSocket. Accepts bearer token via the Authorization header OR ``?token=``
        query parameter (browsers cannot set headers on the WS upgrade).
      parameters:
      - description: Bearer token, alternative to Authorization header
        in: query
        name: token
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Real-time fleet stream
      tags:
      - stream
swagger: "2.0"
