      count:
        type: integer
      fingerprint:
        type: string
      server_name:
        type: string
    type: object
  store.Session:
    properties:
      agent_id:
        description: |-
          D115 identity columns (nullable for sessions that predate the
          migration OR for lazy-created rows whose authoritative
          session_start never arrived; UpsertSession's COALESCE
          enrichment promotes these from NULL to real values on the
          first session_start).
        type: string
      agent_name:
        type: string
      agent_role:
        type: string
      agent_type:
        type: string
      block_at_pct:
        type: integer
      capture_enabled:
        description: |-
          CaptureEnabled is true when at least one event in this session
          has has_content=true (i.e. prompt content was captured to
          event_content). Computed via EXISTS subquery so no schema
          change is required.
        type: boolean
      client_type:
        type: string
      context:
        additionalProperties: {}
        description: |-
          Runtime context collected by the sensor at init() time and
          stored once in sessions.context (JSONB) on the session_start
          event. Carries hostname, OS, git, orchestration, frameworks,
          etc. -- see sensor/flightdeck_sensor/core/context.py.
        type: object
      degrade_at_pct:
        type: integer
      degrade_to:
        type: string
      ended_at:
        type: string
      flavor:
        type: string
      framework:
        type: string
      has_pending_directive:
        description: HasPendingDirective is true when an undelivered shutdown directive
          exists.
        type: boolean
      host:
        type: string
      last_seen_at:
        type: string
      model:
        type: string
      parent_session_id:
        description: |-
          D126 sub-agent observability columns. Both nullable, both
          populated only on sub-agent sessions (Claude Code Task
          subagent, CrewAI agent execution, LangGraph agent-bearing
          node). Root sessions and direct-SDK sessions carry NULL on
          both. The dashboard's swimlane relationship pill, Sub-agents
          tab, Investigate ROLE / PARENT columns, and Investigate
          TOPOLOGY facets read these directly.
        type: string
      policy_token_limit:
        description: |-
          Active policy thresholds (nullable).
          Populated by GetSession via effective policy lookup.
          Null if no policy applies at any scope.
        type: integer
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_limit:
        type: integer
      token_name:
        description: |-
          TokenName is the human-readable name of the access_tokens row
          that authenticated the session_start event (D095). Nullable:
          tok_dev-authenticated sessions and pre-Phase-5 rows carry NULL.
          Preserved across token revocation (sessions.token_id clears via
          ON DELETE SET NULL but sessions.token_name is a static snapshot
          so the dashboard can attribute historical sessions even after
          the token row is gone). Mirrors the SessionListItem.TokenName
          returned by GetSessions.
        type: string
      tokens_used:
        type: integer
      warn_at_pct:
        type: integer
    type: object
  store.SessionListItem:
    properties:
      agent_id:
        description: |-
          D115 identity (nullable for lazy-created rows awaiting an
          authoritative session_start).
        type: string
      agent_name:
        type: string
      agent_role:
        type: string
      agent_type:
        type: string
      capture_enabled:
        type: boolean
      child_count:
        description: |-
          ChildCount (D126 UX revision 2026-05-03) — derived count of
          sessions whose parent_session_id equals this row's
          session_id. Always present on the wire (zero on lone agents
          and on pure children that have no descendants of their
          own). Surfaced server-side via a correlated subquery on the
          listing query so the Investigate parent-row pill (``→ N``)
          renders without a per-row follow-up fetch — same pattern as
          ErrorTypes / PolicyEventTypes / MCPErrorTypes above. Hits
          the existing ``sessions_parent_session_id_idx`` partial
          index.
        type: integer
      client_type:
        type: string
      close_reasons:
        description: |-
          Per-session aggregates for the operator-actionable enrichment
          facets. Each field is a distinct-value array (or boolean) over
          the session's events. Same correlated-subquery pattern as
          ErrorTypes / PolicyEventTypes so the dashboard renders the
          new sidebar facets without a per-session follow-up fetch.

            * CloseReasons: distinct close_reason values across the
              session's session_end events.
            * EstimatedViaValues: distinct estimated_via values across
              pre_call / post_call / embeddings events.
            * HasTerminalError: true when at least one llm_error event
              in the session carries terminal=true.
            * MatchedEntryIDs: distinct policy_decision.matched_entry_id
              values across MCP-policy events.
            * OriginatingCallContexts: distinct
              payload->>'originating_call_context' values across the
              session's events (the MCP method that triggered downstream
              activity — call_tool / read_resource / etc.).
        items:
          type: string
        type: array
      context:
        additionalProperties: true
        type: object
      duration_s:
        type: number
      ended_at:
        type: string
      error_types:
        description: |-
          ErrorTypes lists every distinct ``payload->'error'->>'error_type''
          observed across the session's ``llm_error`` events. Always
          present on the wire (empty array when the session has no
          errors) so dashboard code can treat the slice as
          non-nullable. Mirrors the ``frameworks`` JSONB-array surfacing
          shape: aggregated server-side via a correlated subquery on the
          listing query so the dashboard can render the ERROR TYPE facet
          and the row-level error indicator without a per-session
          follow-up fetch.
        items:
          type: string
        type: array
      estimated_via_values:
        items:
          type: string
        type: array
      flavor:
        type: string
      has_terminal_error:
        type: boolean
      host:
        type: string
      last_seen_at:
        description: |-
          LastSeenAt is the most-recent activity timestamp on the session.
          For active/idle/stale/lost: max(events.occurred_at), projected
          through the worker's last_seen_at column. For closed: aligned
          with ended_at. Drives the Investigate "Last Seen" column
          (S-TBL-1) and is sortable via ?sort=last_seen_at.
        type: string
      matched_entry_ids:
        items:
          type: string
        type: array
      mcp_error_types:
        description: |-
          MCPErrorTypes (Phase 5) lists every distinct
          ``payload->'error'->>'error_type'`` observed across the
          session's MCP events (any event_type starting with ``mcp_``
          whose payload carries an ``error`` object). Always present on
          the wire (empty array when no MCP event in the session
          failed). Mirrors the ErrorTypes correlated-subquery pattern,
          scoped to MCP rather than llm_error rows so the Investigate
          session-row red MCP indicator can render without a per-session
          follow-up fetch.
        items:
          type: string
        type: array
      mcp_server_names:
        description: |-
          MCPServerNames (Phase 5) lists every distinct MCP server name
          the session connected to, derived at query time from
          ``sessions.context->'mcp_servers'`` JSONB. Always present on
          the wire (empty array when the session connected to no MCP
          server) so dashboard code treats the slice as non-nullable.
          Names only — the listing payload stays lean; the full
          fingerprint (transport, version, capabilities, instructions)
          rides along on the detail endpoint via the existing context
          envelope. Mirrors the ErrorTypes / PolicyEventTypes shape.
        items:
          type: string
        type: array
      model:
        type: string
      originating_call_contexts:
        items:
          type: string
        type: array
      parent_session_id:
        description: |-
          D126 sub-agent observability columns. Both nullable, both
          populated only on sub-agent sessions (Claude Code Task
          subagent, CrewAI agent execution, LangGraph agent-bearing
          node). The dashboard's swimlane relationship pill,
          SessionDrawer Sub-agents tab, Investigate ROLE / PARENT
          columns and TOPOLOGY / ROLE facets read these directly.
        type: string
      policy_event_types:
        description: |-
          PolicyEventTypes lists every distinct policy enforcement
          ``event_type`` observed in the session. Includes both the
          token-budget axis (``policy_warn`` / ``policy_degrade`` /
          ``policy_block``) and the MCP Protection Policy axis
          (``policy_mcp_warn`` / ``policy_mcp_block`` /
          ``mcp_server_name_changed`` / ``mcp_policy_user_remembered``,
          per D131). Always present on the wire (empty array when the
          session carries no policy events). Same surfacing pattern as
          ErrorTypes — correlated subquery on the listing query so the
          dashboard renders the POLICY + MCP POLICY facets and
          severity-ranked session-row indicator without a per-session
          follow-up fetch. The dashboard splits the unified array into
          two sidebar facets via the EVENT_TYPE_GROUPS classification.
        items:
          type: string
        type: array
      session_id:
        type: string
      started_at:
        type: string
      state:
        type: string
      token_id:
        description: |-
          D095: attribution for the access_tokens row that opened this
          session. TokenID is nullable because revocation clears the FK
          (ON DELETE SET NULL); TokenName is preserved for auditability
          so the UI can still render "Created via: Staging K8s (revoked)"
          long after the token row is gone.
        type: string
      token_limit:
        type: integer
      token_name:
        type: string
      tokens_used:
        type: integer
    type: object
  store.SessionsResponse:
    properties:
      has_more:
        type: boolean
      limit:
        type: integer
      offset:
        type: integer
      sessions:
        items:
          $ref: '#/definitions/store.SessionListItem'
        type: array
      total:
        type: integer
    type: object
host: localhost:8081
info:
  contact: {}
  description: Fleet visibility, session history, and control plane for AI agent fleets
  title: Flightdeck Query API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /v1/access-tokens:
    get:
      description: Returns every access_tokens row. Hash and salt are never exposed;
        the raw token itself is available only on the POST response at creation time
        (D095).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store.AccessTokenRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List access tokens
      tags:
      - access-tokens
    post:
      consumes:
      - application/json
      description: Mints an opaque ftd_ bearer token. The plaintext token is returned
        exactly once in the response; the platform cannot recover it afterwards. See
        DECISIONS.md D095.
      parameters:
      - description: Token name
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateAccessTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.CreatedAccessTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create an access token
      tags:
      - access-tokens
  /v1/access-tokens/{id}:
    delete:
      description: Deletes the access_tokens row. The seeded Development Token row
        is protected and returns 403. Sessions previously authenticated with the token
        keep their token_name for auditability (sessions.token_id is set to NULL via
        ON DELETE SET NULL). See DECISIONS.md D095.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Revoke an access token
      tags:
      - access-tokens
    patch:
      consumes:
      - application/json
      description: Updates the name field on the access_tokens row. Historical sessions
        keep their original token_name snapshot. The Development Token row is protected
        and returns 403.
      parameters:
      - description: Token ID
        in: path
        name: id
        required: true
        type: string
      - description: New name
        in: body
        name: token
        required: true
        schema:
          $ref: '#/definitions/handlers.RenameAccessTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AccessTokenRow'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Rename an access token
      tags:
      - access-tokens
  /v1/admin/reconcile-agents:
    post:
      description: 'One-shot operation that makes the agents table correct: recomputes
        total_sessions, total_tokens, first_seen_at, and last_seen_at against sessions
        ground truth (per-agent transaction; partial errors surface in the response
        errors array), then deletes orphan rows whose post-reconcile total_sessions
        = 0 AND last_seen_at < NOW() - orphan_threshold_secs. Pass orphan_threshold_secs=0
        to skip the delete step (counters-only). Default threshold is 30 days. Values
        < 60 s rejected with 400 to prevent reaping freshly-upserted agents that the
        worker has not yet wired up to a session_start.'
      parameters:
      - description: Override the 30d default for the orphan-delete step. 0 skips
          deletion (counters-only). Values 1..59 rejected with 400.
        in: query
        name: orphan_threshold_secs
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Reconcile completed; errors array is empty
          schema:
            $ref: '#/definitions/store.ReconcileResult'
        "207":
          description: Reconcile completed with per-agent errors (see errors array)
          schema:
            $ref: '#/definitions/store.ReconcileResult'
        "400":
          description: orphan_threshold_secs malformed or absurdly small
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Another reconcile is already in progress
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Fatal database error (agent listing or pool exhaustion)
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Reconcile agent rollup counters AND reap stale orphan rows
      tags:
      - admin
  /v1/agents:
    get:
      description: Returns agents matching the supplied filters. Multi-value filters
        (state, agent_type, client_type, hostname, user, os, orchestration) accept
        comma-separated values and repeated query params; values within a dimension
        are OR, values across dimensions are AND. “search“ is a case-insensitive substring
        match against “agent_name“ and “hostname“. “updated_since“ filters on “last_seen_at
        >= ts“. State is computed via LATERAL subquery against the most-recent session.
        Each row also carries D126 sub-agent rollup fields (“agent_role“ — null for
        root agents, the framework-supplied role string when this agent represents
        a sub-agent identity; “topology“ — one of “lone“ / “parent“ / “child“, computed
        from whether this agent's sessions carry a parent_session_id and whether they
        are referenced as a parent by other agents). Pagination defaults to 25/page,
        max 100.
      parameters:
      - description: 'Filter by agent_type (repeatable/comma: coding, production)'
        in: query
        name: agent_type
        type: string
      - description: 'Filter by client_type (repeatable/comma: claude_code, flightdeck_sensor)'
        in: query
        name: client_type
        type: string
      - description: 'Filter by rollup state (repeatable/comma: active, idle, stale,
          closed, lost)'
        in: query
        name: state
        type: string
      - description: Filter by hostname (repeatable/comma, exact match)
        in: query
        name: hostname
        type: string
      - description: Filter by user_name (repeatable/comma, exact match)
        in: query
        name: user
        type: string
      - description: Filter by sessions.context.os (EXISTS subquery; matches if ANY
          session had the OS)
        in: query
        name: os
        type: string
      - description: Filter by sessions.context.orchestration (EXISTS subquery)
        in: query
        name: orchestration
        type: string
      - description: Case-insensitive substring search on agent_name + hostname
        in: query
        name: search
        type: string
      - description: Filter to agents whose last_seen_at >= this ISO-8601 timestamp
        in: query
        name: updated_since
        type: string
      - description: 'Sort column (default: last_seen_at). One of: last_seen_at, first_seen_at,
          agent_name, total_sessions, total_tokens, state, user, hostname'
        in: query
        name: sort
        type: string
      - description: 'asc or desc (default: desc)'
        in: query
        name: order
        type: string
      - description: Max results (default 25, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentListResponse'
        "400":
          description: Invalid filter value, sort column, order direction, or limit
            over 100
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List agents with filters, search, sort, and pagination
      tags:
      - agents
  /v1/agents/{agent_id}:
    get:
      description: Returns the full AgentSummary for a single agent including rollup
        counters and the LATERAL-computed rollup state. Powers the Investigate chip
        agent-name resolver so the UI no longer has to fall back to a UUID prefix
        when the filtered sessions list is empty.
      parameters:
      - description: Agent UUID
        in: path
        name: agent_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentSummary'
        "400":
          description: Invalid UUID format
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get agent detail by id
      tags:
      - agents
  /v1/agents/{agent_id}/summary:
    get:
      description: Returns totals (tokens, errors, sessions, cost_usd, latency_p50_ms,
        latency_p95_ms) and a per-bucket time series for one agent over the requested
        period. Powers the per-agent landing page. “period“ is one of “1h“, “24h“,
        “7d“, “30d“ (default “7d“). “bucket“ is one of “hour“, “day“, “week“; when
        omitted it is derived from period (1h/24h → hour, 7d/30d → day). Errors count
        events with “event_type = 'llm_error'“ only — policy events are enforcement
        decisions, not failures. Sessions is “COUNT(DISTINCT session_id)“ across events
        in the window. Latency percentiles use “event_type = 'post_call'“ rows only,
        matching the analytics endpoint convention.
      parameters:
      - description: Agent UUID
        in: path
        name: agent_id
        required: true
        type: string
      - description: 'Time window: 1h, 24h, 7d (default), 30d'
        in: query
        name: period
        type: string
      - description: 'Series bucket granularity: hour, day, week. Defaults derived
          from period.'
        in: query
        name: bucket
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AgentSummaryResponse'
        "400":
          description: Invalid UUID, period, or bucket
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Agent not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get per-agent activity summary
      tags:
      - agents
  /v1/analytics:
    get:
      description: Flexible GROUP BY analytics endpoint. Returns time series data
        grouped by dimension.
      parameters:
      - description: 'Metric: tokens, sessions, latency_avg, latency_p50, latency_p95,
          policy_events, estimated_cost, parent_token_sum, child_token_sum, child_count,
          parent_to_first_child_latency_ms (default: tokens). The four sub-agent metrics
          (D126) operate over the parent / child relationship via recursive CTE on
          parent_session_id.'
        in: query
        name: metric
        type: string
      - description: 'Dimension(s) (default: flavor). One or two dimensions, comma-separated
          (D126 § 6.4): ?group_by=dim1 keeps the pre-D126 single-axis shape; ?group_by=dim1,dim2
          returns a two-key rollup where dim1 is the primary (outer) axis and dim2
          is the secondary (inner) axis. Allowed values in either position: flavor,
          model, framework, host, agent_type, team, provider, agent_role, parent_session_id.
          agent_role (D126) groups by the framework-supplied sub-agent role string
          and parent_session_id (D126 § 6.4) groups by parent UUID; both bucket nulls
          as ''(root)''. Two-dim payloads carry per-DataPoint “breakdown[]“ segments
          (key+value); single-dim payloads keep the flat “value“ shape exactly.'
        in: query
        name: group_by
        type: string
      - description: 'Time range: today, 7d, 30d, 90d, custom (default: 30d)'
        in: query
        name: range
        type: string
      - description: Start time ISO 8601 (required when range=custom)
        in: query
        name: from
        type: string
      - description: End time ISO 8601 (required when range=custom)
        in: query
        name: to
        type: string
      - description: 'Granularity: hour, day, week (default: day)'
        in: query
        name: granularity
        type: string
      - description: Filter to specific flavor
        in: query
        name: filter_flavor
        type: string
      - description: Filter to specific model
        in: query
        name: filter_model
        type: string
      - description: Filter to specific agent_type
        in: query
        name: filter_agent_type
        type: string
      - description: Filter to specific provider (anthropic, openai, google, xai,
          mistral, meta, other)
        in: query
        name: filter_provider
        type: string
      - description: Filter analytics scope to a single agent (UUID). Joins sessions
          when the metric's base table is events. Powers the per-agent landing page.
        in: query
        name: filter_agent_id
        type: string
      - description: 'D126: filter analytics scope to children of one specific parent
          session (UUID).'
        in: query
        name: filter_parent_session_id
        type: string
      - description: 'D126: when true, restrict to parent sessions only (those referenced
          as a parent_session_id by at least one other session).'
        in: query
        name: filter_has_sub_agents
        type: boolean
      - description: 'D126: when true, restrict to child sessions only (parent_session_id
          IS NOT NULL).'
        in: query
        name: filter_is_sub_agent
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.AnalyticsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Query analytics
      tags:
      - analytics
  /v1/directives:
    post:
      consumes:
      - application/json
      description: Issues a shutdown or custom directive to a single agent session
        or all sessions of a flavor
      parameters:
      - description: Directive definition
        in: body
        name: directive
        required: true
        schema:
          $ref: '#/definitions/handlers.DirectiveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store.Directive'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create directive
      tags:
      - directives
  /v1/directives/custom:
    delete:
      description: Deletes custom_directives rows where name LIKE prefix%. Intended
        for smoke test idempotency; not a production feature.
      parameters:
      - description: Name prefix to match (e.g. smoke_)
        in: query
        name: name_prefix
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DeleteCustomDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete custom directives by name prefix (dev/test only)
      tags:
      - custom-directives
    get:
      description: Returns all registered custom directives, optionally filtered by
        flavor.
      parameters:
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CustomDirectivesListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List custom directives
      tags:
      - custom-directives
  /v1/directives/register:
    post:
      consumes:
      - application/json
      description: Registers custom directive definitions. Updates last_seen_at on
        conflict. Requires bearer token.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Registration request with directives
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.RegisterDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Register custom directives
      tags:
      - custom-directives
  /v1/directives/sync:
    post:
      consumes:
      - application/json
      description: Checks which directive fingerprints are registered. Returns fingerprints
        not found. Requires bearer token.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Sync request with flavor and fingerprints
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.SyncDirectivesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SyncDirectivesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Missing or invalid bearer token
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Sync custom directive fingerprints
      tags:
      - custom-directives
  /v1/events:
    get:
      description: Returns events matching time range, flavor, event type, and session
        filters with pagination. Supports optional ``before`` keyset cursor and ``order``
        direction so the session drawer can paginate backwards in time when loading
        older events for long-running stable sessions.
      parameters:
      - description: Start time (ISO 8601)
        in: query
        name: from
        required: true
        type: string
      - description: End time (ISO 8601, defaults to now)
        in: query
        name: to
        type: string
      - description: Filter by flavor
        in: query
        name: flavor
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by session ID
        in: query
        name: session_id
        type: string
      - description: Keyset cursor (ISO 8601). When set, only rows with occurred_at
          < before are returned. Pair with order=desc for newest-first drawer pagination.
        in: query
        name: before
        type: string
      - description: 'Sort order: asc (default) or desc'
        in: query
        name: order
        type: string
      - description: Max results (default 500, max 2000)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.EventsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List events with filters
      tags:
      - events
  /v1/events/{id}/content:
    get:
      description: Returns prompt capture content for an event. Returns 404 when the
        event does not exist or capture was not enabled.
      parameters:
      - description: Event UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/store.EventContent'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get event content
      tags:
      - events
  /v1/fleet:
    get:
      description: Returns agents with aggregated state rollup and pagination. Each
        row also carries D126 sub-agent rollup fields (``agent_role`` — null for root
        agents, the framework-supplied role string when this agent represents a sub-agent
        identity; ``topology`` — one of ``lone`` / ``parent`` / ``child``). Includes
        runtime context facets aggregated across all non-terminal sessions for the
        dashboard CONTEXT sidebar.
      parameters:
      - description: Page number (1-based, default 1)
        in: query
        name: page
        type: integer
      - description: Rows per page (default 50, max 200)
        in: query
        name: per_page
        type: integer
      - description: 'Filter by D114 agent type: ''coding'', ''production'', or empty
          for all'
        in: query
        name: agent_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.FleetResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get fleet state (agent-level, D115)
      tags:
      - fleet
  /v1/mcp-policies/{flavor}:
    delete:
      description: Deletes a flavor policy. The global cannot be deleted. Audit-log
        row preserved via ON DELETE SET NULL on policy_id.
      parameters:
      - description: Agent flavor
        in: path
        name: flavor
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete flavor MCP protection policy
      tags:
      - mcp-policy
    get:
      description: Returns the flavor's policy + entries. 404 when no flavor policy
        exists.
      parameters:
      - description: Agent flavor
        in: path
        name: flavor
        required: true
        type: string
      produces:
